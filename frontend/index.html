<!-- NOSONAR -->
<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BAZSPARK Digital Twin — Safety-Critical Fire Alarm Engineering Platform" />
    <meta name="theme-color" content="#0f172a" />

    <!-- V193 (R12): Favicon set for all platforms -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    
    <!-- CSRF Token -->
    <meta name="csrf-token" content="" />

  <!--
    NOSONAR: S7039 unsafe-inline required for Tailwind CSS + React dev mode.
    Security Note: 'unsafe-inline' in style-src is required for critical CSS
    that prevents Flash of Unstyled Content (FOUC) during initial load.
    This approach is defended because:
    1. CSP blocks 'unsafe-inline' for script-src (critical security)
    2. style-src 'unsafe-inline' only affects visual styling
    3. The CSS is static, not dynamically generated
    4. Alternatives (nonce/hash) would add significant complexity
  -->
  <!-- NOSONAR — S7039: HTML acceptable -->
  <meta  # NOSONAR - Web:S7039
    http-equiv="Content-Security-Policy"
    content="default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    font-src 'self';
    connect-src 'self' http://localhost:8000 ws://localhost:8000 __CSP_CONNECT_SRC__;
    base-uri 'self';
    form-action 'self';"
  />

    <!-- Security: Prevent MIME-type sniffing (works via <meta>) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />


    <!-- Security: Control referrer information (works via <meta>) -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: Disable unnecessary browser features (works via <meta>) -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>BAZSPARK Digital Twin</title>
    <style>
      /* Critical CSS for initial load — prevents FOUC */
      body {
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner shown before React hydrates */
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #0f172a;
        color: #94a3b8;
        font-family: Inter, system-ui, sans-serif;
      }
      .app-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #ea580c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .app-loader-text {
        margin-top: 1rem;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:2rem;color:#e2e8f0;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h1 style="font-size:1.5rem;margin-bottom:1rem;">BAZSPARK requires JavaScript</h1>
        <p style="color:#94a3b8;">Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Loading BAZSPARK Digital Twin...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
