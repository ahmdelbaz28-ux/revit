<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BAZSPARK Digital Twin — Safety-Critical Fire Alarm Engineering Platform" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- CSRF Token -->
    <meta name="csrf-token" content="" />

    <!--
      V190 FIX: CSP via <meta> tag.
      ============================================
      ROOT CAUSE: The browser console showed two warnings on EVERY page load:
        1. "The Content Security Policy directive 'frame-ancestors' is ignored
           when delivered via a <meta> element."
        2. "X-Frame-Options may only be set via an HTTP header sent along with
           a document. It may not be set inside <meta>."

      Per the CSP specification (https://www.w3.org/TR/CSP3/):
        - The following directives are NOT allowed in <meta> tags and MUST be
          delivered via HTTP header: frame-ancestors, report-uri, sandbox.
        - X-Frame-Options is an HTTP header by definition — it has no <meta>
          equivalent.

      Previously these were in the <meta> tag, the browser silently ignored
      them, so the clickjacking protection was NOT actually enforced.

      ROOT-CAUSE FIX (per Rule 17):
        1. Remove `frame-ancestors 'none'` from the <meta> CSP (it's ignored).
        2. Remove the <meta http-equiv="X-Frame-Options"> tag entirely (it's
           ignored and produces a console warning).
        3. The Vite dev server already sets X-Frame-Options: DENY as an HTTP
           header (vite.config.ts:129). For production, the deployment
           platform (Vercel/HF Space/nginx) must set:
             - Content-Security-Policy: frame-ancestors 'none'
             - X-Frame-Options: DENY
           as HTTP headers.
        4. The remaining CSP directives (default-src, script-src, style-src,
           img-src, font-src, connect-src, base-uri, form-action) ARE valid
           in <meta> tags and remain here. They are honored by the browser.

      This eliminates BOTH console warnings without weakening security —
      the protections were never actually working via <meta>, so removing
      them changes nothing functionally. The real protections come from
      the HTTP headers.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;
               font-src 'self';
               connect-src 'self' http://localhost:8000 ws://localhost:8000 __CSP_CONNECT_SRC__;
               base-uri 'self';
               form-action 'self';"
    />

    <!-- Security: Prevent MIME-type sniffing (works via <meta>) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!--
      V190 FIX: Removed <meta http-equiv="X-Frame-Options" content="DENY" />
      (was ignored by browser — X-Frame-Options is HTTP-header-only).
      The X-Frame-Options: DENY HTTP header is set by:
        - Vite dev server: vite.config.ts:129
        - Production: must be set by Vercel/HF Space/nginx config
    -->

    <!-- Security: Control referrer information (works via <meta>) -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: Disable unnecessary browser features (works via <meta>) -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>BAZSPARK Digital Twin</title>
    <style>
      /* Critical CSS for initial load — prevents FOUC */
      body {
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner shown before React hydrates */
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #0f172a;
        color: #94a3b8;
        font-family: Inter, system-ui, sans-serif;
      }
      .app-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #ea580c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .app-loader-text {
        margin-top: 1rem;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:2rem;color:#e2e8f0;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h1 style="font-size:1.5rem;margin-bottom:1rem;">BAZSPARK requires JavaScript</h1>
        <p style="color:#94a3b8;">Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Loading BAZSPARK Digital Twin...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
