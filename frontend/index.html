<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BAZSPARK Digital Twin — Safety-Critical Fire Alarm Engineering Platform" />
    <meta name="theme-color" content="#070b12" />

    <!-- Favicon set for all platforms -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- V242: Vite automatically injects modulepreload links for the entry
         chunk and its direct dependencies at build time. We don't add manual
         preload links here because the chunk hashes change on every build —
         hardcoding them would cause 404s. Vite's buildModulePreload config
         handles this correctly. -->

    <!-- V242: System font stack for instant text render (no external fetch).
         Inter is still loaded as a progressive enhancement, but the
         critical text renders immediately using the system font. This
         eliminates the render-blocking Google Fonts request from FCP. -->
    <style>
      /* Critical CSS — system font fallback for instant FCP */
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      }
    </style>

    <!-- Inter font — loaded async for progressive enhancement (non-blocking).
         V242: Uses preload + a tiny inline <script> (allowed by CSP because
         script-src 'self' covers <script> tags without inline JS — this
         snippet has no inline handler, just a defer-loaded module that
         swaps the stylesheet media). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      media="print"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- CSRF Token -->
    <meta name="csrf-token" content="" />

<!-- Content Security Policy
          V7039 FIX: Removed 'unsafe-inline' from style-src to pass SonarCloud quality gate.
          React inline styles (style={{...}}) are now allowed via the CSP Level 3
          style-src-attr directive instead — this is more secure because it only
          permits style ATTRIBUTES, not arbitrary <style> elements.
          For <style> elements (critical CSS), a nonce-based approach is used:
          the 'nonce-{{nonce}}' source in style-src is replaced at request time
          by the hosting platform (Vercel / HF Space edge middleware) with a
          cryptographically random nonce that matches the nonce attribute on
          the <style> element below.
     -->
     <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob:;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://ahmdelbaz28-bazspark.hf.space https://revit-rust.vercel.app;
    base-uri 'self';
    form-action 'self';" />

    <!-- Security: Prevent MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: Control referrer information -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: Disable unnecessary browser features -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>BAZSPARK Digital Twin</title>
    <style nonce="{{nonce}}">
      /* Critical CSS for initial load — prevents FOUC */
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background-color: #070b12;
        color: #e8f0fe;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner shown before React hydrates */
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #070b12;
        color: #94a3b8;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .app-loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(31, 45, 68, 0.5);
        border-top-color: #22d3ee;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .app-loader-text {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:2rem;color:#e8f0fe;background:#070b12;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h1 style="font-size:1.5rem;margin-bottom:1rem;">BAZSPARK requires JavaScript</h1>
        <p style="color:#94a3b8;">Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Loading BAZSPARK Digital Twin...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
