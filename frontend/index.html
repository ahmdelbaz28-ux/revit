<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BAZSPARK Digital Twin — Safety-Critical Fire Alarm Engineering Platform" />
    <meta name="theme-color" content="#070b12" />

    <!-- Favicon set for all platforms -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Inter font — clean, modern, professional -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSRF Token -->
    <meta name="csrf-token" content="" />

    <!-- Content Security Policy
         V211 FIX (SonarCloud S7039): removed 'unsafe-inline' from script-src and
         wildcard https: from img-src. Inline scripts are injected by Vite with a
         nonce during build (see vite.config.ts). img-src now lists explicit
         allowed hosts instead of the broad https: wildcard.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob:;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://ahmdelbaz28-bazspark.hf.space https://*.vercel.app http://localhost:8000 ws://localhost:8000;
    base-uri 'self';
    form-action 'self';"
    />

    <!-- Security: Prevent MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: Control referrer information -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security: Disable unnecessary browser features -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />

    <title>BAZSPARK Digital Twin</title>
    <style>
      /* Critical CSS for initial load — prevents FOUC */
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background-color: #070b12;
        color: #e8f0fe;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner shown before React hydrates */
      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #070b12;
        color: #94a3b8;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .app-loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(31, 45, 68, 0.5);
        border-top-color: #22d3ee;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .app-loader-text {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align:center;padding:2rem;color:#e8f0fe;background:#070b12;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <h1 style="font-size:1.5rem;margin-bottom:1rem;">BAZSPARK requires JavaScript</h1>
        <p style="color:#94a3b8;">Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root">
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Loading BAZSPARK Digital Twin...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
