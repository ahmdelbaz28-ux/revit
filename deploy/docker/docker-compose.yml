name: fireai

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:size=100M
    - /app/tmp:size=50M
  cap_drop:
    - ALL

services:
  redis:
    image: redis:7.4-alpine
    container_name: fireai-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis-data:/data
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=10M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - fireai-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  db:
    image: postgres:16-alpine
    container_name: fireai-db
    environment:
      POSTGRES_USER: ${DB_USER:-fireai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-fireai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fireai} -d ${DB_NAME:-fireai}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fireai-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    image: fireai/api:${FIREAI_VERSION:-latest}
    container_name: fireai-api
    # v2 NOTE: replicas=2 below is only safe if ALL in-memory state has been
    # moved out of the API process. Known in-memory state that breaks under
    # replicas > 1:
    #   - fireai/core/fireai_api.py: _task_store dict (per-process task tracking)
    #   - backend/app.py: _cache dict (response cache)
    #   - fireai/core/api_server.py: RateLimiter._clients dict (per-IP rate limit)
    # Until these are migrated to Redis (which is already in this compose file),
    # set replicas=1 OR set up sticky sessions at the nginx layer. Otherwise a
    # client that creates a task on replica A and polls replica B gets a 404.
    environment:
      FIREAI_ENV: production
      FIREAI_API_KEY: ${FIREAI_API_KEY:?FIREAI_API_KEY required}
      FIREAI_EVIDENCE_HMAC_KEY: ${FIREAI_EVIDENCE_HMAC_KEY:?HMAC_KEY required}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-fireai}:${DB_PASSWORD:?DB_PASSWORD required}@db:5432/${DB_NAME:-fireai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FIREAI_MEMORY_LLM_PROVIDER: ${FIREAI_MEMORY_LLM_PROVIDER:-gemini}
      FIREAI_MEMORY_LLM_MODEL: ${FIREAI_MEMORY_LLM_MODEL:-gemini-2.0-flash}
    volumes:
      - fireai-data:/app/data
      - fireai-logs:/app/logs
    <<: *default-security
    logging: *default-logging
    healthcheck:
      # v2: use curl instead of python -c — lighter, clearer exit code
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - fireai-net
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 120s

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    image: fireai/worker:${FIREAI_VERSION:-latest}
    container_name: fireai-worker
    environment:
      FIREAI_ENV: production
      FIREAI_API_KEY: ${FIREAI_API_KEY:?FIREAI_API_KEY required}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-fireai}:${DB_PASSWORD:?DB_PASSWORD required}@db:5432/${DB_NAME:-fireai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      WORKER_MODE: ${WORKER_MODE:-default}
    volumes:
      - fireai-data:/app/data
      - fireai-logs:/app/logs
    <<: *default-security
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import os; sys.exit(0 if os.path.exists('/app/data/worker_heartbeat') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - fireai-net
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first

  nginx:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.nginx
    image: fireai/nginx:${FIREAI_VERSION:-latest}
    container_name: fireai-nginx
    ports:
      # v2 FIX: previously both 80 and 443 were mapped to nginx's port 8080,
      # but nginx.conf only listens on 8080 with NO TLS. That meant HTTPS
      # traffic on port 443 arrived at nginx as plain HTTP — no TLS
      # termination was happening. Two valid fixes (choose ONE):
      #
      # Option A (recommended): terminate TLS at an external LB (AWS ALB,
      # Cloudflare, Traefik). Keep only port 80 here for the LB → nginx hop.
      - "80:8080"
      #
      # Option B: terminate TLS at nginx itself. Uncomment 443:443 below,
      # add `listen 443 ssl;` and `ssl_certificate`/`ssl_certificate_key`
      # directives to nginx.conf, and mount the cert files as volumes.
      # - "443:443"
    <<: *default-security
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fireai-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  fireai-data:
    driver: local
  fireai-logs:
    driver: local

networks:
  fireai-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
