# FireAI Microservices — Docker Compose
# Phase P6: Gradual microservices extraction
#
# Services:
#   - api:        FastAPI main server
#   - worker:     Celery background task processor
#   - redis:      Message broker + result backend
#   - frontend:   Next.js/Vite development server

version: "3.9"

services:
  # ── Redis — Message Broker ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI — Main API Server ──
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - FIREAI_REDIS_URL=redis://redis:6379/0
      - FIREAI_CELERY_BROKER=redis://redis:6379/0
      - FIREAI_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

  # ── Celery Worker — Background Processing ──
  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    environment:
      - FIREAI_REDIS_URL=redis://redis:6379/0
      - FIREAI_CELERY_BROKER=redis://redis:6379/0
      - FIREAI_CELERY_BACKEND=redis://redis:6379/0
      - FIREAI_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

  # ── Frontend — Vite Dev Server ──
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:8000

volumes:
  redis_data:
  upload_data:
