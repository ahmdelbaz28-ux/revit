# Alertmanager Configuration — FireAI Platform
# =============================================
# V130 FIX (2026-06-18 audit): This file was previously a Prometheus alerting
# *rules* file (groups/rules/expr) which belongs in a separate file loaded by
# prometheus.yml (`rule_files:`). The actual Alertmanager *routing* config
# must define `route:` and `receivers:` blocks. Alerts were firing into the
# void — no notifications were ever sent.
#
# The original Prometheus alert rules have been moved to:
#   deploy/observability/prometheus-alert-rules.yml
#
# This file now contains a proper Alertmanager routing configuration with
# real notification receivers (email + Slack + PagerDuty webhook).

global:
  resolve_timeout: 5m
  # SMTP settings for email receiver — set via environment vars in production.
  smtp_smarthost: "${SMTP_SMARTHOST:localhost:587}"
  smtp_from: "${SMTP_FROM:fireai-alerts@fireai.org}"
  smtp_auth_username: "${SMTP_USER:}"
  smtp_auth_password: "${SMTP_PASSWORD:}"

# Top-level route — every alert flows through this tree.
route:
  receiver: default-pager
  group_by: ["alertname", "severity", "team"]
  group_wait: 30s          # batch alerts for 30s before sending the first notification
  group_interval: 5m       # minimum interval between notifications for the same group
  repeat_interval: 4h      # re-send an unresolved alert every 4h
  routes:
    # Critical alerts → page immediately, no grouping delay.
    - matchers:
        - severity = "critical"
      receiver: pagerduty-critical
      group_wait: 0s
      repeat_interval: 1h
      continue: true        # also send to Slack for visibility

    # Warning alerts → email + Slack, grouped.
    - matchers:
        - severity = "warning"
      receiver: slack-warnings
      group_wait: 1m
      repeat_interval: 6h

    # Info alerts → Slack only.
    - matchers:
        - severity = "info"
      receiver: slack-info
      group_wait: 5m
      repeat_interval: 24h

# Notification receivers — configure webhook URLs via environment vars.
receivers:
  - name: default-pager
    webhook_configs:
      - url: "${PAGERDUTY_WEBHOOK_URL:https://events.pagerduty.com/v2/enqueue}"
        send_resolved: true

  - name: pagerduty-critical
    webhook_configs:
      - url: "${PAGERDUTY_CRITICAL_WEBHOOK_URL:https://events.pagerduty.com/v2/enqueue}"
        send_resolved: true

  - name: slack-warnings
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/REPLACE_ME}"
        channel: "#fireai-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"

  - name: slack-info
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/REPLACE_ME}"
        channel: "#fireai-info"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

# Inhibition rules — suppress lower-severity alerts when a critical one is firing.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity =~ "warning|info"
    equal: ["alertname", "team"]

  - source_matchers:
      - severity = "warning"
    target_matchers:
      - severity = "info"
    equal: ["alertname", "team"]
