global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: fireai
    namespace: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'prometheus-alert-rules.yml'

scrape_configs:
  - job_name: 'fireai-engine'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['engine:8000']
        labels:
          component: engine

  - job_name: 'fireai-api'
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: /api/v1/monitor/metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          component: api

  - job_name: 'fireai-worker'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:8000']
        labels:
          component: worker

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'redis-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']
