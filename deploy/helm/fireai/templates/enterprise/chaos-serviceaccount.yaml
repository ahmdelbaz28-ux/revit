{{- /*
ServiceAccount + RBAC for Chaos Mesh experiments.

V133 (2026-06-21): Chaos Mesh experiments created in the `chaos-mesh`
namespace need RBAC to target pods in the `fireai` namespace. This
ServiceAccount lives in the chaos-mesh namespace (where the experiments
run) and is bound to a ClusterRole that grants the chaos-mesh.org CRDs
plus the verbs needed to inject/rollback experiments.

Note: This manifest creates the ServiceAccount in the `chaos-mesh`
namespace, which must already exist (installed via the Chaos Mesh Helm
chart). The ClusterRoleBinding is cluster-scoped so a single binding
covers all target namespaces.

Wires:
  - chaosEngineering.enabled → toggle
*/ -}}
{{- if .Values.chaosEngineering.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fireai-chaos-runner
  namespace: chaos-mesh
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: fireai-chaos
    app.kubernetes.io/component: chaos-runner
---
# ClusterRole: grants CRUD on all Chaos Mesh CRDs plus the verbs to
# watch/list pods in any namespace (experiments target pods by label
# selector across namespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fireai-chaos-runner
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: fireai-chaos
rules:
  # Chaos Mesh CRDs — PodChaos, NetworkChaos, IOChaos, DNSChaos, etc.
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Pods — needed for the chaos controller to inject faults into target pods.
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch"]
  # Events — Chaos Mesh emits events for experiment lifecycle.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # Services — NetworkChaos needs to read service selectors.
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fireai-chaos-runner
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: fireai-chaos
subjects:
  - kind: ServiceAccount
    name: fireai-chaos-runner
    namespace: chaos-mesh
roleRef:
  kind: ClusterRole
  name: fireai-chaos-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
