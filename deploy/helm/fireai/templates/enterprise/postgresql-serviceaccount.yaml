{{- /*
ServiceAccount + RBAC for PostgreSQL HA pods.

V133 (2026-06-21): The PostgreSQL StatefulSet references this
ServiceAccount for two reasons:
  1. WAL archiving to S3 — when `postgresqlHA.walArchive.serviceAccountAnnotation`
     is set (IRSA on EKS or workload identity on GKE), this ServiceAccount
     is annotated with the cloud IAM role that grants s3:PutObject on the
     WAL archive bucket.
  2. Patroni DCS — if Patroni uses Kubernetes configmaps for leader
     election (instead of etcd), this ServiceAccount needs RBAC to
     read/write configmaps in the FireAI namespace.

For production, prefer the bitnami/postgresql-ha Helm chart as a
dependency — it handles Patroni RBAC out of the box. This manifest
is a minimal reference for clusters that can't add Helm dependencies.

Wires:
  - postgresqlHA.enabled                              → toggle
  - postgresqlHA.walArchive.serviceAccountAnnotation  → IRSA/workload-identity annotation
*/ -}}
{{- if .Values.postgresqlHA.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fireai.fullname" . }}-postgresql
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgresql-ha
    app.kubernetes.io/component: database
  {{- with .Values.postgresqlHA.walArchive.serviceAccountAnnotation }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
---
# Role: allows Patroni to manage configmaps for leader election.
# Without this, Patroni can't write the leader-lock configmap and
# failover will not work.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fireai.fullname" . }}-postgresql
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgresql-ha
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "patch", "update", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "update", "watch"]
  # Pods need to label themselves as 'role: primary' or 'role: replica'
  # for the read-write and read-only Services to route correctly.
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fireai.fullname" . }}-postgresql
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgresql-ha
subjects:
  - kind: ServiceAccount
    name: {{ include "fireai.fullname" . }}-postgresql
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: {{ include "fireai.fullname" . }}-postgresql
  apiGroup: rbac.authorization.k8s.io
{{- end }}
