{{- /*
V133 (2026-06-21): In DR standby mode, Ingress is disabled to
prevent traffic from reaching the secondary region's API. The
secondary region's API pods still run (warm standby) but receive
no external traffic until promoted to primary.
*/ -}}
{{- $standbyMode := and .Values.multiRegion.enabled .Values.multiRegion.secondary.standby }}
{{- if and .Values.ingress.enabled (not $standbyMode) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fireai.fullname" . }}-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fireai.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.services.api.name }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
