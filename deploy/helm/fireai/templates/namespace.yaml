apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    name: {{ .Values.namespace.name }}
    environment: {{ .Values.global.environment }}
    security-tier: critical
    compliance: nfpa72-2022
    {{- with .Values.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    description: "FireAI Safety-Critical Fire Protection Platform"
    security.fireai.com/zero-trust: "enforced"
    {{- with .Values.namespace.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
