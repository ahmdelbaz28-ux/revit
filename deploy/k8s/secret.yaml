apiVersion: v1
kind: Secret
metadata:
  name: fireai-secrets
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/part-of: fireai
type: Opaque
stringData:
  FIREAI_API_KEY: "<base64-encoded-api-key>"
  FIREAI_EVIDENCE_HMAC_KEY: "<base64-encoded-hmac-key>"
  DB_PASSWORD: "<base64-encoded-db-password>"
  REDIS_PASSWORD: "<base64-encoded-redis-password>"
  GEMINI_API_KEY: "<base64-encoded-gemini-key>"
  ENCRYPTION_KEY: "<base64-encoded-32-byte-key>"
  JWT_SECRET: "<base64-encoded-jwt-secret>"
---
apiVersion: v1
kind: Secret
metadata:
  name: fireai-tls
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/part-of: fireai
type: kubernetes.io/tls
stringData:
  tls.crt: "<base64-encoded-certificate>"
  tls.key: "<base64-encoded-private-key>"
