apiVersion: v1
kind: Secret
metadata:
  name: fireai-secrets
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/part-of: fireai
type: Opaque
# P2.10 FIX: stringData expects PLAINTEXT values (k8s base64-encodes automatically).
# Do NOT pre-base64-encode these values. Replace placeholders with real secrets
# at deploy time, or use a secrets manager (Sealed Secrets, External Secrets, etc.).
stringData:
  FIREAI_API_KEY: "REPLACE_WITH_REAL_API_KEY"
  FIREAI_EVIDENCE_HMAC_KEY: "REPLACE_WITH_REAL_HMAC_KEY"
  DB_PASSWORD: "REPLACE_WITH_REAL_DB_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_REDIS_PASSWORD"
  GEMINI_API_KEY: "REPLACE_WITH_REAL_GEMINI_KEY"
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_ENCRYPTION_KEY"
  JWT_SECRET: "REPLACE_WITH_REAL_JWT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: fireai-tls
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/part-of: fireai
type: kubernetes.io/tls
# For kubernetes.io/tls secrets, tls.crt and tls.key must be PEM-encoded.
# Use `data:` with base64-encoded PEM, or `stringData:` with raw PEM text.
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_REAL_CERTIFICATE_PEM
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REAL_PRIVATE_KEY_PEM
    -----END PRIVATE KEY-----
