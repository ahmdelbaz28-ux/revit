apiVersion: v1
kind: Service
metadata:
  name: fireai-api
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fireai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: fireai-db
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: db
    app.kubernetes.io/part-of: fireai
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: db
---
apiVersion: v1
kind: Service
metadata:
  name: fireai-redis
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: fireai
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: redis
