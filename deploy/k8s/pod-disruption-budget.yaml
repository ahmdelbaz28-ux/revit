apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fireai-api-pdb
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fireai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fireai
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fireai-worker-pdb
  namespace: fireai
  labels:
    app.kubernetes.io/name: fireai
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fireai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fireai
      app.kubernetes.io/component: worker
