# SonarCloud configuration for the FireAI / revit project
# ========================================================
# Addresses two SonarCloud configuration warnings:
#   1. "Your code is analyzed as compatible with all Python 3 versions by
#      default" — fixed by setting `sonar.python.version` below.
#   2. "There are problems with file encoding in the source code" —
#      fixed by setting `sonar.sourceEncoding=UTF-8` (the repo is UTF-8;
#      some files contain Arabic / CJK text that needs explicit UTF-8
#      decoding by the scanner).
#
# These properties are picked up automatically by the SonarCloud GitHub
# Action / scanner when it runs in CI. No code changes required.

sonar.organization=ahmdelbaz28-ux
sonar.projectKey=ahmdelbaz28-ux_revit
sonar.projectName=revit

# --- Language version pins -----------------------------------------------
# Pin the Python version so SonarCloud uses the correct grammar rules
# (avoids false positives from 3.8/3.9 compatibility analysis).
sonar.python.version=3.12

# --- Encoding ------------------------------------------------------------
# Force UTF-8 decoding for all source files. The repo contains Arabic
# comments (e.g. in FloatingErrorLog.tsx) and other non-ASCII content;
# without this, the scanner may fall back to the platform default
# (ISO-8859-1 on some runners) and emit encoding warnings.
sonar.sourceEncoding=UTF-8

# --- Source directories --------------------------------------------------
# Explicit source roots keep the scanner from wandering into vendored
# skills/, node_modules/ and other non-core trees.
sonar.sources=backend,fireai,qomn_fire,qomn_conduit,parsers,adapters,core,frontend/src
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/site-packages/**,\
  **/*.min.js,\
  **/*.min.css,\
  skills/**,\
  docs/**,\
  deploy/**,\
  todo-app/**,\
  scripts/**,\
  tests/**, \
  **/tests/**, \
  frontend/tests/**,\
  facp_distributed/**,\
  facp_system/**,\
  marine/**,\
  revit_data/**,\
  revit_samples/**,\
  logs/**,\
  audit/**,\
  reports/**,\
  data/**, \
  download/**, \
  nginx/**,\
  traefik/**,\
  alembic/**

# --- Test directories (excluded from coverage measurement of main code) --
sonar.tests=tests,backend/tests,fireai/core/tests
sonar.test.exclusions=\
  **/__pycache__/**,\
  **/conftest.py

# --- Coverage (optional — only used if a coverage report is generated) ---
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
