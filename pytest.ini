[tool:pytest]
# Test paths
testpaths = tests

# Add pytest-timeout configuration
timeout = 300
timeout_method = thread

# Additional command-line options
addopts = 
    --strict-markers
    --strict-config
    -ra
    --tb=short
    --disable-warnings
    --showlocals
    --verbose
    --timeout=300

# Test markers
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    safety_critical: marks tests as safety-critical
    security: marks tests as security-related
    compliance: marks tests as compliance-related
    asyncio: marks tests as asyncio-related

# Filter warnings
filterwarnings = 
    error
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning

# Directories to exclude from test discovery
norecursedirs = .git __pycache__ venv env revit-main facp_distributed

# Python file/class/function naming patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Timeout configurations for different test types
[tool:pytest.timeout]
# Default timeout for all tests
timeout = 300

# Specific timeouts for different test markers
slow_timeout = 600
integration_timeout = 600
unit_timeout = 120
safety_critical_timeout = 900