apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: firealarmai-deployment
  namespace: flux-system
spec:
  interval: 5m
  path: ./kubernetes/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: firealarmai-repository
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: firealarmai-api
      namespace: firealarmai-production
  timeout: 2m