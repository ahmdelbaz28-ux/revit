# ═══════════════════════════════════════════════════════════════════════════
# FireAI ML Subsystem — CI Pipeline
# ═══════════════════════════════════════════════════════════════════════════
# Dedicated CI for the fireai/ml/ predictive maintenance subsystem.
# Runs ML-specific tests + verifies ML library compatibility.
#
# Triggers:
#   - On push/PR when files under fireai/ml/, backend/routers/ml.py,
#     frontend/src/pages/PredictiveMaintenancePage.tsx, tests/ml/, or
#     requirements-ml.txt are changed
#   - On main branch push (full pipeline)

name: ML Subsystem CI

on:
  push:
    branches: [main, develop, 'v**']
    paths:
      - 'fireai/ml/**'
      - 'backend/routers/ml.py'
      - 'frontend/src/pages/PredictiveMaintenancePage.tsx'
      - 'frontend/src/services/mlApi.ts'
      - 'frontend/src/components/predictive/**'
      - 'tests/ml/**'
      - 'requirements-ml.txt'
      - 'scripts/test_ml_subsystem.py'
      - 'scripts/train_ml_models_demo.py'
      - '.github/workflows/ml-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'fireai/ml/**'
      - 'backend/routers/ml.py'
      - 'tests/ml/**'
      - 'requirements-ml.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: ML Unit & Integration Tests ───────────────────────────────────
  ml-test-suite:
    name: "ML Test Suite"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install ML dependencies
        run: |
          pip install -r requirements-ml.txt
          pip install pytest pytest-asyncio httpx

      - name: Run ML unit + integration tests
        env:
          FIREAI_API_KEY: ci-test-key-${{ github.sha }}
          FIREAI_ENV: development
        run: |
          pytest tests/ml/ -v \
            --tb=short \
            --junitxml=reports/ml-test-results.xml \
            || exit 1

      - name: Publish ML test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-test-results-${{ matrix.python-version }}
          path: reports/ml-test-results.xml
          retention-days: 14

      - name: Smoke test (production-like flow)
        env:
          FIREAI_API_KEY: ci-test-key-${{ github.sha }}
        run: |
          python scripts/test_ml_subsystem.py

  # ── Gate 2: ML Model Training Sanity Check ────────────────────────────────
  ml-training-sanity:
    name: "ML Training Sanity"
    runs-on: ubuntu-latest
    needs: ml-test-suite

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements-ml.txt

      - name: Train models on synthetic data (verify pipeline)
        run: |
          python scripts/train_ml_models_demo.py

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-artifacts
          path: data/ml_models/
          retention-days: 7

  # ── Gate 3: ML Library Compatibility Matrix ──────────────────────────────
  ml-library-compat:
    name: "ML Library Compatibility"
    runs-on: ubuntu-latest
    needs: ml-test-suite
    strategy:
      matrix:
        library:
          - "xgboost"
          - "lifelines"
          - "shap"
          - "scikit-learn"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ${{ matrix.library }} latest
        run: |
          python -m pip install --upgrade pip
          pip install ${{ matrix.library }}

      - name: Verify import + version
        run: |
          python -c "import ${{ matrix.library }}; print('${{ matrix.library }}:', ${{ matrix.library }}.__version__)"

  # ── Gate 4: Frontend ML Page Build ─────────────────────────────────────────
  ml-frontend-build:
    name: "ML Frontend Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check (ML page + components)
        run: npm run typecheck
        working-directory: frontend

      - name: Build (must include /predictive-maintenance route)
        run: npm run build
        working-directory: frontend

  # ── Success Summary ────────────────────────────────────────────────────────
  success:
    name: "✅ ML Subsystem CI Passed"
    runs-on: ubuntu-latest
    needs: [ml-test-suite, ml-training-sanity, ml-library-compat, ml-frontend-build]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "ML Subsystem CI Summary:"
          echo "========================"
          echo "✅ ML Test Suite (24 tests)"
          echo "✅ ML Training Sanity (synthetic data)"
          echo "✅ ML Library Compatibility (XGBoost, lifelines, SHAP, sklearn)"
          echo "✅ ML Frontend Build (TypeScript + Vite)"
          echo ""
          echo "Pipeline completed successfully!"
