# Secret Scanning — Gitleaks
# Scans for hardcoded secrets on every push and PR.
# Non-blocking: reports findings as warnings.

name: Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Create gitleaks allowlist config
        run: |
          cat > /tmp/gitleaks.toml << 'TOML_EOF'
          title = "BAZspark Gitleaks Config"

          [extend]
          useDefault = true

          [[allowlists]]
          description = "Allowlist workflow and config files that legitimately reference token patterns"
          paths = [
            '''.github/workflows/.*\.yml''',
            '''\.github/workflows/.*\.yaml''',
            '''\.secrets\.baseline''',
            '''.*\.example.*''',
            '''env\.example\.txt''',
            '''\.env\.example''',
            '''CHANGELOG\.md''',
            '''OPS_RUNBOOK\.md''',
            '''FINAL_.*\.md''',
            '''DEPLOY_.*\.md''',
          ]

          [[allowlists]]
          description = "Allowlist safe references to token names in YAML env var patterns only (not actual tokens)"
          regexes = [
            '''\$\{\{\s*secrets\.[A-Z_]+\s*\}\}''',  # GitHub Actions secret references
            '''\$\{\{ env\.[A-Z_]+\s*\}\}''',  # GitHub Actions env var references
          ]
          TOML_EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_CONFIG: /tmp/gitleaks.toml
        continue-on-error: true

      - name: Report scan result
        if: always()
        run: echo "Secret scan completed. Check Security tab for any findings."
