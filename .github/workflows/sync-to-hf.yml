name: Sync to HuggingFace Space

# ═══════════════════════════════════════════════════════════════════════════
# Auto-sync GitHub → HuggingFace Space (ahmdelbaz28/BAZSPARK)
#
# ARCHITECTURE
# ─────────────
# - GitHub repo is the SINGLE SOURCE OF TRUTH (full monorepo: frontend + backend
#   + skills + tests + docs + deploy configs).
# - HuggingFace Space is a DEPLOYMENT TARGET that hosts only the runtime subset
#   (backend Python + frontend source built inside the Dockerfile).
# - On every push to `main`, this workflow mirrors the runtime subset to the HF
#   Space repo so that HF rebuilds the Docker image automatically.
#
# WHAT GETS SYNCED (runtime-only, matches HF Dockerfile COPY statements):
#   Dockerfile, README.md, pyproject.toml, requirements.txt, .dockerignore
#   adapters/ backend/ core/ facp_system/ fireai/ frontend/ integration/
#   marine/ parsers/ qomn_conduit/ qomn_fire/
#
# WHAT IS EXCLUDED (repo-only): .github/ skills/ deploy/ docs/ tests/ *.md
#   (except README.md), alembic/, services/, templates/, vercel.json,
#   revit_data/ (has >10 MiB files HF rejects), todo-app/, etc.
#
# AUTH
# ────
# Uses the `HF_TOKEN` repository secret (write scope on the HF Space).
# ═══════════════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger from Actions tab

concurrency:
  group: sync-to-hf
  cancel-in-progress: false # Don't cancel mid-sync — could leave HF in a broken state

permissions:
  contents: read

env:
  HF_USERNAME: "ahmdelbaz28"
  HF_SPACE_NAME: "BAZSPARK"

jobs:
  sync-to-hf:
    name: Mirror runtime subset to HuggingFace Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Shallow clone — we don't need history, just files

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space into a sibling directory using token auth
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" hf_space
          # Print HF commit SHA for traceability (before sync)
          (cd hf_space && git rev-parse --short HEAD) | tee hf_before_sha.txt
          echo "HF before-sync SHA: $(cat hf_before_sha.txt)"

      - name: Sync runtime files (whitelist + exclude junk)
        run: |
          # ── Whitelist of runtime paths that must exist on HF ──────────────
          # MUST match the COPY statements in the HF Dockerfile.
          # If you add a new COPY to the Dockerfile, add the path here too.
          RUNTIME_PATHS=(
            "Dockerfile"
            "README.md"
            "pyproject.toml"
            "requirements.txt"
            ".dockerignore"
            "adapters"
            "backend"
            "core"
            "facp_system"
            "fireai"
            "frontend"
            "integration"
            "marine"
            "parsers"
            "qomn_conduit"
            "qomn_fire"
          )

          # ── Step 1: wipe the HF working tree clean (keep only .git/) ──────
          # This ensures files that no longer exist on GitHub get removed from HF.
          find hf_space -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # ── Step 2: copy each whitelisted path from GitHub checkout ──────
          for p in "${RUNTIME_PATHS[@]}"; do
            if [ -e "${{ github.workspace }}/${p}" ]; then
              # Use rsync with junk-file exclusions to avoid pushing cache/build artifacts
              rsync -a \
                --exclude='node_modules/' \
                --exclude='__pycache__/' \
                --exclude='*.pyc' \
                --exclude='.venv/' \
                --exclude='venv/' \
                --exclude='dist/' \
                --exclude='build/' \
                --exclude='.env*' \
                --exclude='*.db' \
                --exclude='*.sqlite*' \
                --exclude='coverage/' \
                --exclude='.pytest_cache/' \
                --exclude='.mypy_cache/' \
                --exclude='.ruff_cache/' \
                --exclude='.git/' \
                "${{ github.workspace }}/${p}" "hf_space/${p}"
              echo "  + synced: ${p}"
            else
              echo "  ! skipped (not in repo): ${p}"
            fi
          done

          echo ""
          echo "=== HF Space contents after sync ==="
          ls -la hf_space/ | head -30

      - name: Commit & push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_SHA: ${{ github.sha }}
        run: |
          cd hf_space

          # Stage all changes (including deletions from the wipe step)
          git add -A

          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to sync — HF Space is already up-to-date with GitHub ${GH_SHA::7}"
            exit 0
          fi

          # Summary of what changed
          echo "=== Files changed in this sync ==="
          git diff --cached --stat | tail -20

          # Compose commit message with full traceability
          git commit -m "Auto-sync from GitHub @ ${GH_SHA::7}" \
                     -m "Source: github.com/${{ github.repository }}@${GH_SHA}" \
                     -m "Trigger: ${{ github.event_name }} by ${{ github.actor }}" \
                     -m "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Push back to HF
          git push "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" HEAD:main

          # Print HF commit SHA for traceability (after sync)
          git rev-parse --short HEAD | tee ../hf_after_sha.txt
          echo ""
          echo "=========================================="
          echo "  HF before-sync SHA: $(cat ../hf_before_sha.txt)"
          echo "  HF after-sync  SHA: $(cat ../hf_after_sha.txt)"
          echo "  GitHub source SHA: ${GH_SHA::7}"
          echo "=========================================="

      - name: HF Space rebuild info
        if: success()
        run: |
          echo "ℹ️ HuggingFace Spaces rebuild automatically on push."
          echo "   Monitor at: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          echo "   Public URL: https://${HF_USERNAME}-${HF_SPACE_NAME,,}.hf.space"
          echo "   Health:     https://${HF_USERNAME}-${HF_SPACE_NAME,,}.hf.space/api/health"
