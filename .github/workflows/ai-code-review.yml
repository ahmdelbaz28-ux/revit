# ═══════════════════════════════════════════════════════════════════════════
# BAZSPARK FireAI — AI Agent Code Review via Daytona Sandbox
# ═══════════════════════════════════════════════════════════════════════════
# Triggers on every PR to main. Spins up a Daytona sandbox (Python 3.12),
# clones the PR head, installs deps, runs the full validation matrix
# (ruff + mypy + pytest + vitest), and posts a structured report comment
# back to the PR. The sandbox auto-evicts after the job completes
# (Daytona 1h session limit is ample for a review pass).
#
# Required repo secrets:
#   DAYTONA_API_TOKEN  — Daytona cloud API token (dtn_…) — mapped to DAYTONA_API_KEY env var
#   GITHUB_TOKEN       — automatic, used for PR comment
#
# The workflow maps `secrets.DAYTONA_API_TOKEN` → env var `DAYTONA_API_KEY`
# (the name the Daytona SDK reads). `DAYTONA_API_URL` is hardcoded to the
# Daytona cloud endpoint; override via a repo secret if self-hosting.
#
# API reference: daytona-sdk >= 0.10.0 (note: package renamed to `daytona`
# in newer versions; this workflow supports both via try/except import).
#   - DaytonaConfig(api_key=..., api_url=...) → Daytona(config)
#   - CreateSandboxFromImageParams(image=..., language=..., env_vars=...,
#       resources=Resources(cpu=2, memory=4, disk=10), public=False,
#       auto_stop_interval=3600)
#   - client.create(params, timeout=300) -> Sandbox
#   - client.get(sandbox_id) -> Sandbox
#   - client.delete(sandbox_object, timeout=60)
#
# See: docs/DEV_PIPELINE.md  →  "Phase 2: AI Agent Code Review"
# ═══════════════════════════════════════════════════════════════════════════

name: AI Code Review (Daytona)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

# Cancel superseded runs on the same PR (save Daytona minutes)
concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  daytona-review:
    name: "Daytona sandbox review"
    runs-on: ubuntu-latest
    # Skip draft PRs unless explicitly dispatched
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python 3.12 (runner-side control plane)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Daytona SDK + tooling
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          python -m pip install --upgrade pip
          # Prefer the new `daytona` package; fall back to `daytona_sdk` (deprecated alias)
          pip install "daytona>=0.10.0" || pip install "daytona-sdk>=0.10.0"
          pip install PyGithub httpx

      - name: Provision Daytona sandbox
        id: sandbox
        env:
          # The Daytona SDK reads these env vars directly (DaytonaConfig auto-loads them)
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_API_URL: https://app.daytona.io/api
          DAYTONA_TARGET: us
        run: |
          set -euo pipefail
          python <<'PY'
          import os, sys, pathlib

          # Support both `daytona` (new) and `daytona_sdk` (deprecated) packages
          try:
              from daytona import Daytona, CreateSandboxFromImageParams, Resources, DaytonaConfig
          except ImportError:
              from daytona_sdk import Daytona, CreateSandboxFromImageParams, Resources, DaytonaConfig

          # SDK reads DAYTONA_API_KEY / DAYTONA_API_URL / DAYTONA_TARGET from env.
          # Pass config explicitly too for belt-and-suspenders robustness.
          config = DaytonaConfig(
              api_key=os.environ["DAYTONA_API_KEY"],
              api_url=os.environ["DAYTONA_API_URL"],
          )
          client = Daytona(config)

          params = CreateSandboxFromImageParams(
              image="python:3.12-slim",
              language="python",
              env_vars={
                  "FIREAI_ENV": "ci",
                  "PIP_NO_CACHE_DIR": "1",
                  "CI": "true",
              },
              # V209: disk stays at 10GB (Daytona cloud max per sandbox).
              # npm ci + node_modules fit within 10GB if we clean up apt cache + pip cache.
              resources=Resources(cpu=2, memory=4, disk=10),
              public=False,
              # Auto-evict after 1h (Daytona session limit) as a safety net
              auto_stop_interval=3600,
          )
          print("▶ Creating Daytona sandbox (image=python:3.12-slim, 2vCPU/4GB/20GB)…", flush=True)
          sb = client.create(params, timeout=300)
          print(f"✓ Sandbox created: id={sb.id}", flush=True)

          # Persist sandbox ID for downstream steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"id={sb.id}\n")
          pathlib.Path("/tmp/sandbox_id.txt").write_text(sb.id)
          PY

      - name: Run validation matrix in sandbox
        id: matrix
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_API_URL: https://app.daytona.io/api
          DAYTONA_TARGET: us
        run: |
          set -euo pipefail
          python <<'PY'
          import os, sys, json, pathlib, subprocess

          try:
              from daytona import Daytona, DaytonaConfig
          except ImportError:
              from daytona_sdk import Daytona, DaytonaConfig

          config = DaytonaConfig(
              api_key=os.environ["DAYTONA_API_KEY"],
              api_url=os.environ["DAYTONA_API_URL"],
          )
          client = Daytona(config)
          sandbox_id = pathlib.Path("/tmp/sandbox_id.txt").read_text().strip()
          sb = client.get(sandbox_id)

          def run(cmd, timeout=300):
              """Execute shell in sandbox, return (exit_code, stdout, stderr).
              Note: ExecuteResponse has `exit_code` + `result` (combined stdout/stderr),
              NOT separate `stdout`/`stderr` fields.
              """
              try:
                  resp = sb.process.exec(cmd, timeout=timeout)
                  # `result` contains combined stdout + stderr from the sandbox shell
                  return resp.exit_code, resp.result or "", ""
              except Exception as e:
                  return 99, "", f"daytona-exec-error: {e}"

          results = {}

          # 1. Push the PR code into the sandbox via tarball
          #    upload_file(src: str | bytes, dst: str) — accepts a path or bytes, NOT a file object
          #    V208: include .git/ so setuptools-scm can infer the version (pyproject.toml uses
          #    setuptools_scm[toml] for dynamic versioning). Without .git, `pip install -e .` fails
          #    with "LookupError: setuptools-scm was unable to detect version".
          print("▶ Packaging PR source into tarball…", flush=True)
          subprocess.run(
              ["tar", "--exclude=node_modules",
               "--exclude=__pycache__", "--exclude=.venv",
               "--exclude=db/*.db",
               # NOTE: .git IS included (setuptools-scm needs it)
               "-czf", "/tmp/pr-src.tar.gz", "."],
              check=True,
          )
          sb.fs.upload_file("/tmp/pr-src.tar.gz", "/tmp/pr-src.tar.gz")
          print("▶ Extracting + installing deps in sandbox (V209: Node.js + libgeos + requirements.txt)…", flush=True)
          # V209: install system deps (Node.js 20 for tsc, libgeos-dev for shapely, gcc for building C exts)
          # BEFORE pip install. python:3.12-slim doesn't include any of these.
          # V209: install from requirements.txt first (more reliable than `pip install -e .` for deps),
          # then install the package itself with --no-deps (deps already installed above).
          # V208: set SETUPTOOLS_SCM_PRETEND_VERSION as a fallback in case .git is incomplete.
          rc, so, se = run(
              "export DEBIAN_FRONTEND=noninteractive && "
              "apt-get update -qq && "
              "apt-get install -y --no-install-recommends curl ca-certificates gnupg libgeos-dev gcc && "
              "curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && "
              "apt-get install -y --no-install-recommends nodejs && "
              "rm -rf /var/lib/apt/lists/* && "
              "node --version && npm --version && "
              "mkdir -p /workspace && cd /workspace && "
              "tar -xzf /tmp/pr-src.tar.gz && "
              "rm -f /tmp/pr-src.tar.gz && "
              "python -m ensurepip --upgrade 2>&1 || true && "
              "python -m pip install --upgrade pip setuptools wheel 2>&1 && "
              "python -m pip install -r requirements.txt 2>&1 && "
              "SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0 "
              "python -m pip install -e . --no-deps 2>&1 && "
              "python -m pip install ruff mypy bandit pytest pytest-cov pytest-asyncio pytest-timeout 2>&1",
              timeout=900,
          )
          install_log = (so + se)[-3000:]
          print(f"  install rc={rc}", flush=True)
          print(f"  install log tail:\n{install_log[-1500:]}", flush=True)
          if rc != 0:
              # If install failed, record it and skip the matrix
              results = {
                  "install": {"rc": rc, "out": install_log, "err": ""},
                  "ruff":    {"rc": 127, "out": "", "err": "skipped — install failed"},
                  "mypy":    {"rc": 127, "out": "", "err": "skipped — install failed"},
                  "pytest":  {"rc": 127, "out": "", "err": "skipped — install failed"},
                  "tsc":     {"rc": 127, "out": "", "err": "skipped — install failed"},
              }
              pathlib.Path("/tmp/review-results.json").write_text(json.dumps(results, indent=2))
              sys.exit(0)

          # 2. Ruff lint (V209: no tail — capture full output, tail in Python)
          rc, so, se = run("cd /workspace && ruff check backend/ fireai/ core/ parsers/ --output-format=github 2>&1", timeout=180)
          results["ruff"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          # 3. MyPy (backend only — skills excluded per V140 root-cause; V209: no tail)
          rc, so, se = run("cd /workspace && mypy backend/ fireai/ core/ --ignore-missing-imports --no-error-summary 2>&1", timeout=240)
          results["mypy"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          # 4. Pytest (backend) — core + parsers + fireai only (fast subset; V209: no tail)
          rc, so, se = run(
              "cd /workspace && python -m pytest core/tests parsers/tests fireai/core/tests "
              "--no-cov -q --timeout=60 -p no:cacheprovider 2>&1",
              timeout=600,
          )
          results["pytest"] = {"rc": rc, "out": so[-3000:], "err": se[-500:]}

          # 5. Frontend: typecheck (V209: Node.js 20 now installed; no tail)
          rc, so, se = run(
              "cd /workspace/frontend && "
              "(npm ci --no-audit --no-fund 2>&1 || npm install --no-audit --no-fund 2>&1) && "
              "npx tsc -p tsconfig.json --noEmit 2>&1",
              timeout=600,
          )
          results["tsc"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          pathlib.Path("/tmp/review-results.json").write_text(json.dumps(results, indent=2))
          print("✓ Validation matrix complete", flush=True)
          for k, v in results.items():
              print(f"  - {k}: rc={v['rc']}")
          PY

      - name: Post structured review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = {};
            try { results = JSON.parse(fs.readFileSync('/tmp/review-results.json','utf8')); } catch {}

            const icon = (rc) => rc === 0 ? '✅' : '❌';
            const shorten = (s, n=1200) => (s||'').slice(-n);
            const prNumber = ${{ steps.pr.outputs.number }};

            const lines = [];
            lines.push('## 🤖 AI Code Review — Daytona Sandbox');
            lines.push('');
            lines.push('| Check | Status | Notes |');
            lines.push('|---|---|---|');
            for (const [name, r] of Object.entries(results)) {
              lines.push(`| \`${name}\` | ${icon(r.rc)} (rc=${r.rc}) | \`${shorten((r.out + r.err).replace(/\n/g,' '), 120)}\` |`);
            }
            lines.push('');
            if (results.install) {
              lines.push('<details><summary>Install log (tail)</summary>');
              lines.push('');
              lines.push('```');
              lines.push(shorten(results.install.out || results.install.err || '(no output)', 2000));
              lines.push('```');
              lines.push('</details>');
              lines.push('');
            }
            lines.push('<details><summary>Ruff output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.ruff?.out || results.ruff?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('<details><summary>MyPy output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.mypy?.out || results.mypy?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('<details><summary>Pytest output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.pytest?.out || results.pytest?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('---');
            lines.push('_Sandbox auto-evicts after job completion. Re-run by pushing to the PR branch._');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n'),
            });

      - name: Teardown sandbox
        if: always()
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_API_URL: https://app.daytona.io/api
          DAYTONA_TARGET: us
        run: |
          if [[ ! -f /tmp/sandbox_id.txt ]]; then
            echo "(no sandbox to tear down)"
            exit 0
          fi
          python <<'PY'
          import os, pathlib, sys

          try:
              from daytona import Daytona, DaytonaConfig
          except ImportError:
              from daytona_sdk import Daytona, DaytonaConfig

          config = DaytonaConfig(
              api_key=os.environ["DAYTONA_API_KEY"],
              api_url=os.environ["DAYTONA_API_URL"],
          )
          sid = pathlib.Path("/tmp/sandbox_id.txt").read_text().strip()
          try:
              client = Daytona(config)
              # delete() takes a Sandbox object — fetch it first
              sb = client.get(sid)
              client.delete(sb)
              print(f"✓ Sandbox {sid} deleted")
          except Exception as e:
              print(f"⚠ Sandbox delete failed (will auto-evict): {e}", file=sys.stderr)
              # Non-fatal — sandbox auto-evicts after auto_stop_interval
          PY
