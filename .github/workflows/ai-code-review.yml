# ═══════════════════════════════════════════════════════════════════════════
# BAZSPARK FireAI — AI Agent Code Review via Daytona Sandbox
# ═══════════════════════════════════════════════════════════════════════════
# Triggers on every PR to main. Spins up a Daytona sandbox (Python 3.12),
# clones the PR head, installs deps, runs the full validation matrix
# (ruff + mypy + pytest + vitest), and posts a structured report comment
# back to the PR. The sandbox auto-evicts after the job completes
# (Daytona 1h session limit is ample for a review pass).
#
# Required repo secrets:
#   DAYTONA_API_TOKEN   — Daytona cloud API token (dtn_…)
#   DAYTONA_SERVER_URL  — optional; defaults to https://app.daytona.io
#   GITHUB_TOKEN        — automatic, used for PR comment
#
# See: docs/DEV_PIPELINE.md  →  "Phase 2: AI Agent Code Review"
# ═══════════════════════════════════════════════════════════════════════════

name: AI Code Review (Daytona)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

# Cancel superseded runs on the same PR (save Daytona minutes)
concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  daytona-review:
    name: "Daytona sandbox review"
    runs-on: ubuntu-latest
    # Skip draft PRs unless explicitly dispatched
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python 3.12 (runner-side control plane)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Daytona SDK + tooling
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          python -m pip install --upgrade pip
          pip install "daytona-sdk>=0.10.0" PyGithub httpx

      - name: Provision Daytona sandbox
        id: sandbox
        env:
          DAYTONA_API_TOKEN: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL || 'https://app.daytona.io' }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os, json, sys, time
          from daytona_sdk import Daytona, Sandbox, DaytonaSandboxParams

          api_token = os.environ["DAYTONA_API_TOKEN"]
          server_url = os.environ.get("DAYTONA_SERVER_URL", "https://app.daytona.io")

          client = Daytona(api_key=api_token, server_url=server_url)

          # Use the project's own devcontainer — guarantees parity with CodeSandbox devbox
          params = DaytonaSandboxParams(
              language="python",
              image="python:3.12-slim",
              env_vars={
                  "FIREAI_ENV": "ci",
                  "PIP_NO_CACHE_DIR": "1",
                  "CI": "true",
              },
              resources={"cpu": 2, "memory": 4, "disk": 10},
              public=False,
          )
          print("▶ Creating Daytona sandbox (target image: python:3.12-slim)…", flush=True)
          sb = client.create(params, timeout=300)
          print(f"✓ Sandbox created: id={sb.id}", flush=True)

          # Persist for downstream steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"id={sb.id}\n")
          # Save the sandbox object reference for the teardown step
          with open("/tmp/sandbox_id.txt", "w") as f:
              f.write(sb.id)
          PY

      - name: Run validation matrix in sandbox
        id: matrix
        env:
          DAYTONA_API_TOKEN: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL || 'https://app.daytona.io' }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os, sys, json, base64, pathlib
          from daytona_sdk import Daytona

          api_token   = os.environ["DAYTONA_API_TOKEN"]
          server_url  = os.environ.get("DAYTONA_SERVER_URL", "https://app.daytona.io")
          sandbox_id  = pathlib.Path("/tmp/sandbox_id.txt").read_text().strip()

          client = Daytona(api_key=api_token, server_url=server_url)
          sb = client.get_current_sandbox(sandbox_id)

          def run(cmd, timeout=300):
              """Execute shell in sandbox, return (exit_code, stdout, stderr)."""
              try:
                  resp = sb.process.exec(cmd, timeout=timeout)
                  return resp.exit_code, resp.stdout or "", resp.stderr or ""
              except Exception as e:
                  return 99, "", f"daytona-exec-error: {e}"

          results = {}

          # 1. Push the PR code into the sandbox
          #    (We tar the workspace locally and stream it via the SDK's filesystem API.)
          import subprocess, io
          print("▶ Packaging PR source into tarball…", flush=True)
          subprocess.run(
              ["tar", "--exclude=.git", "--exclude=node_modules",
               "--exclude=__pycache__", "--exclude=.venv",
               "--exclude=db/*.db", "-czf", "/tmp/pr-src.tar.gz", "."],
              check=True,
          )
          # Upload to sandbox
          sb.fs.upload_file("/tmp/pr-src.tar.gz", open("/tmp/pr-src.tar.gz","rb"))
          print("▶ Extracting + installing deps in sandbox…", flush=True)
          rc, so, se = run(
              "mkdir -p /workspace && cd /workspace && "
              "tar -xzf /tmp/pr-src.tar.gz && "
              "pip install --quiet --upgrade pip setuptools wheel && "
              "pip install --quiet -e . ruff mypy bandit pytest pytest-cov pytest-asyncio pytest-timeout 2>&1 | tail -20",
              timeout=600,
          )

          # 2. Ruff lint
          rc, so, se = run("cd /workspace && ruff check backend/ fireai/ core/ parsers/ --output-format=github", timeout=180)
          results["ruff"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          # 3. MyPy (backend only — skills excluded per V140 root-cause)
          rc, so, se = run("cd /workspace && mypy backend/ fireai/ core/ --ignore-missing-imports --no-error-summary 2>&1 | tail -40", timeout=240)
          results["mypy"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          # 4. Pytest (backend) — core + parsers + fireai only (fast subset)
          rc, so, se = run(
              "cd /workspace && python -m pytest core/tests parsers/tests fireai/core/tests "
              "--no-cov -q --timeout=60 -p no:cacheprovider 2>&1 | tail -40",
              timeout=600,
          )
          results["pytest"] = {"rc": rc, "out": so[-3000:], "err": se[-500:]}

          # 5. Frontend: typecheck (Node + npm ci may exceed budget; gate behind a flag)
          rc, so, se = run(
              "cd /workspace/frontend && "
              "(npm ci --no-audit --no-fund >/dev/null 2>&1 || npm install --no-audit --no-fund >/dev/null 2>&1) && "
              "npx tsc -p tsconfig.json --noEmit 2>&1 | tail -30",
              timeout=600,
          )
          results["tsc"] = {"rc": rc, "out": so[-2000:], "err": se[-500:]}

          # Persist results for the comment step
          pathlib.Path("/tmp/review-results.json").write_text(json.dumps(results, indent=2))
          print("✓ Validation matrix complete", flush=True)
          for k, v in results.items():
              print(f"  - {k}: rc={v['rc']}")
          PY

      - name: Post structured review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = {};
            try { results = JSON.parse(fs.readFileSync('/tmp/review-results.json','utf8')); } catch {}

            const icon = (rc) => rc === 0 ? '✅' : '❌';
            const shorten = (s, n=1200) => (s||'').slice(-n);
            const prNumber = ${{ steps.pr.outputs.number }};

            const lines = [];
            lines.push('## 🤖 AI Code Review — Daytona Sandbox');
            lines.push('');
            lines.push('| Check | Status | Notes |');
            lines.push('|---|---|---|');
            for (const [name, r] of Object.entries(results)) {
              lines.push(`| \`${name}\` | ${icon(r.rc)} (rc=${r.rc}) | \`${shorten((r.out + r.err).replace(/\n/g,' '), 120)}\` |`);
            }
            lines.push('');
            lines.push('<details><summary>Ruff output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.ruff?.out || results.ruff?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('<details><summary>MyPy output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.mypy?.out || results.mypy?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('<details><summary>Pytest output (tail)</summary>');
            lines.push('');
            lines.push('```');
            lines.push(shorten(results.pytest?.out || results.pytest?.err || '(no output)'));
            lines.push('```');
            lines.push('</details>');
            lines.push('');
            lines.push('---');
            lines.push('_Sandbox auto-evicts after job completion. Re-run by pushing to the PR branch._');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n'),
            });

      - name: Teardown sandbox
        if: always()
        env:
          DAYTONA_API_TOKEN: ${{ secrets.DAYTONA_API_TOKEN }}
          DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL || 'https://app.daytona.io' }}
        run: |
          if [[ ! -f /tmp/sandbox_id.txt ]]; then
            echo "(no sandbox to tear down)"
            exit 0
          fi
          python <<'PY'
          import os, pathlib
          from daytona_sdk import Daytona
          api_token  = os.environ["DAYTONA_API_TOKEN"]
          server_url = os.environ.get("DAYTONA_SERVER_URL", "https://app.daytona.io")
          sid        = pathlib.Path("/tmp/sandbox_id.txt").read_text().strip()
          try:
              client = Daytona(api_key=api_token, server_url=server_url)
              client.delete(sid)
              print(f"✓ Sandbox {sid} deleted")
          except Exception as e:
              print(f"⚠ Sandbox delete failed (will auto-evict): {e}")
          PY
