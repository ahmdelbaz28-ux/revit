name: Vercel Preview Deployment

# V236 (2026-07-13): Create Vercel PREVIEW deployments for PRs.
#
# This workflow creates a preview deployment on Vercel for every pull_request
# targeting main. The deployment URL is posted as a comment on the PR and
# added as a GitHub deployment status (environment: "Preview – BAZspark").
#
# This complements the existing `Trigger Vercel Deploy` workflow which only
# handles production deployments on push to main.
#
# Preview deployments:
#   - Use the same Vercel project (prj_cLO9iGH2sEG5LGSV1tv95CWimkl5)
#   - Target: preview (not production)
#   - Auto-aliased to <branch>.vercel.app
#   - Status reported back to GitHub via deployments API

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview-deploy:
    name: Create Vercel Preview Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run if the secret is available
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request }}
    steps:
      - name: Check required secrets
        id: check-secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_DEPLOY_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ ERROR: VERCEL_DEPLOY_TOKEN secret is not set"
            echo "   Create it at: https://vercel.com/account/tokens"
            echo "   Then add as GitHub secret: VERCEL_DEPLOY_TOKEN"
            exit 1
          fi
          echo "✅ VERCEL_DEPLOY_TOKEN is set"

      - name: Create GitHub Preview Deployment record
        id: gh-deploy
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request?.head.ref || context.ref.replace('refs/heads/', '');
            const sha = context.payload.pull_request?.head.sha || context.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              sha: sha,
              environment: 'Preview – BAZspark',
              description: 'Vercel Preview Deployment',
              required_contexts: [],
              auto_merge: false,
              production_environment: false,
            });
            core.setOutput('deployment_id', deployment.data.id);
            console.log(`Created GitHub deployment: ${deployment.data.id} (env: Preview – BAZspark)`);

      - name: Trigger Vercel preview deployment via API
        id: trigger
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_DEPLOY_TOKEN }}
          PROJECT_ID: prj_cLO9iGH2sEG5LGSV1tv95CWimkl5
          TEAM_ID: team_thkWFCepMKbBSrOf5ulqi4wF
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOYMENT_ID: ${{ steps.gh-deploy.outputs.deployment_id }}
        run: |
          set -euo pipefail

          # Build the deployment payload — target is "preview" (not production)
          DEPLOY_PAYLOAD=$(cat <<EOF
          {"name":"ba-zspark","target":"preview","gitSource":{"type":"github","org":"ahmdelbaz28-ux","repo":"BAZspark","ref":"${REF}","sha":"${SHA}"},"ref":"${REF}"}
          EOF
          )

          echo "::group::Trigger Vercel Preview Deployment"
          echo "Branch: $REF"
          echo "SHA: $SHA"
          echo "PR: #$PR_NUMBER"
          echo ""

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS"

            RESPONSE=$(curl -sS -w "\n%{http_code}" \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              -X POST \
              "https://api.vercel.com/v13/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_PAYLOAD" || echo "CURL_FAILED")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "HTTP response: $HTTP_CODE"

            # Success cases
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              DEPLOY_UID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','unknown'))" 2>/dev/null || echo "unknown")
              DEPLOY_URL=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || echo "")
              INSPECTOR_URL=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('inspectorUrl',''))" 2>/dev/null || echo "")

              echo "deploy_uid=$DEPLOY_UID" >> "$GITHUB_OUTPUT"
              echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
              echo "inspector_url=$INSPECTOR_URL" >> "$GITHUB_OUTPUT"
              echo "✅ Preview deployment triggered: $DEPLOY_UID"
              echo "   URL: https://$DEPLOY_URL"
              echo "   Inspector: $INSPECTOR_URL"
              echo "::endgroup::"
              exit 0
            fi

            # Daily limit hit
            if echo "$BODY" | grep -q "api-deployments-free-per-day"; then
              echo "⚠️  Vercel free plan daily limit reached (100 deploys/day)"
              echo "   The deployment did NOT happen. Limit resets in ~24h."
              echo "daily_limit_hit=true" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            # Auth errors
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
              echo "❌ Vercel API auth failed ($HTTP_CODE)"
              exit 1
            fi

            # Retry on transient errors
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              BACKOFF=$((attempt * 10))
              echo "⚠️  Attempt $attempt failed (HTTP $HTTP_CODE). Retrying in ${BACKOFF}s..."
              sleep "$BACKOFF"
            else
              echo "❌ All $MAX_ATTEMPTS attempts failed (last HTTP $HTTP_CODE)"
              echo "   Response: $BODY"
              exit 1
            fi
          done

      - name: Mark GitHub deployment as success
        if: success() && steps.trigger.outputs.deploy_uid
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.trigger.outputs.deploy_url }}
          INSPECTOR_URL: ${{ steps.trigger.outputs.inspector_url }}
        with:
          script: |
            const deploymentId = ${{ steps.gh-deploy.outputs.deployment_id }};
            const deployUrl = process.env.DEPLOY_URL;
            const inspectorUrl = process.env.INSPECTOR_URL;
            const targetUrl = deployUrl ? `https://${deployUrl}` : (inspectorUrl || '');

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              description: 'Preview deployment triggered successfully',
              environment_url: targetUrl,
              log_url: inspectorUrl || `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              auto_inactive: true,
            });
            console.log(`✅ Marked deployment ${deploymentId} as success`);

      - name: Mark GitHub deployment as failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.gh-deploy.outputs.deployment_id }};
            if (!deploymentId) {
              console.log('No deployment ID to mark as failure');
              return;
            }
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'failure',
              description: 'Preview deployment failed — see workflow logs',
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
            console.log(`❌ Marked deployment ${deploymentId} as failure`);

      - name: Comment PR with preview URL
        if: success() && steps.trigger.outputs.deploy_url && github.event.pull_request
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.trigger.outputs.deploy_url }}
          INSPECTOR_URL: ${{ steps.trigger.outputs.inspector_url }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = process.env.DEPLOY_URL;
            const inspectorUrl = process.env.INSPECTOR_URL;

            const body = [
              '## 🚀 Vercel Preview Deployment Created',
              '',
              `**Preview URL:** https://${deployUrl}`,
              '',
              `**Inspector:** ${inspectorUrl}`,
              '',
              '---',
              '_This preview deployment will be ready in ~30 seconds. The URL will be updated with the deployment status once the build completes._',
            ].join('\n');

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Vercel Preview Deployment Created')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
              console.log(`Updated existing comment on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
              console.log(`Created new comment on PR #${prNumber}`);
            }

      - name: Write job summary
        if: always()
        env:
          DEPLOY_URL: ${{ steps.trigger.outputs.deploy_url }}
          INSPECTOR_URL: ${{ steps.trigger.outputs.inspector_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## Vercel Preview Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | [\`${SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${SHA}) |"
            if [ -n "$PR_NUMBER" ]; then
              echo "| PR | #${PR_NUMBER} |"
            fi
            if [ -n "$DEPLOY_URL" ]; then
              echo "| Preview URL | https://${DEPLOY_URL} |"
              echo "| Inspector | ${INSPECTOR_URL} |"
              echo "| Outcome | ✅ Preview deployment triggered |"
            else
              echo "| Outcome | ❌ Failed |"
            fi
            echo ""
            echo "---"
            echo "_Triggered by [${{ github.actor }}](https://github.com/${{ github.actor }})_"
          } >> "$GITHUB_STEP_SUMMARY"
