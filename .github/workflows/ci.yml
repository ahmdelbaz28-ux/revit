# ═══════════════════════════════════════════════════════════════════════════
# CAD/BIM Integration Platform — CI/CD Validation Matrix Pipeline
# ═══════════════════════════════════════════════════════════════════════════
# Comprehensive CI/CD pipeline for CAD/BIM integration platform
# Including: linting, type checking, testing, security audit, Docker build
#
# Gates:
#   1. Static Analysis (Ruff, MyPy, Bandit)
#   2. Test Suite (pytest with coverage)
#   3. Frontend Build (TypeScript, lint, build)
#   4. Dependency Audit (pip-audit)
#   5. Docker Build & Test
# ═══════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'v**']
  pull_request:
    branches: [main]

# ── Concurrency: Cancel previous runs on same branch ──────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: Static Validation ────────────────────────────────────────────
  static-analysis:
    name: "Gate 1 — Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff bandit mypy

      - name: Create reports directory
        run: mkdir -p reports

      - name: Ruff lint
        run: ruff check backend/ fireai/ core/ skills/ backend_app.py --exit-non-zero-on-fix

      - name: MyPy type check
        run: mypy backend/ fireai/ core/ skills/ --ignore-missing-imports --no-strict-optional --exclude '.*test.*'

      - name: Bandit security scan
        run: bandit -r backend/ fireai/ core/ skills/ backend_app.py -f json -o reports/bandit.json -ll

      - name: Bandit severity gate
        run: |
          if [ -f reports/bandit.json ]; then
            HIGH_COUNT=$(python3 -c "
          import json
          with open('reports/bandit.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']
          print(len(high))
          " 2>/dev/null || echo "0")
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "FAIL: $HIGH_COUNT HIGH severity findings"
              exit 1
            fi
            echo "PASS: No HIGH severity Bandit findings"
          fi

  # ── Gate 2: Test Suite ────────────────────────────────────────────────────
  test-suite:
    name: "Gate 2 — Test Suite"
    runs-on: ubuntu-latest
    needs: static-analysis
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov pytest-asyncio hypothesis

      - name: Run test suite with coverage
        run: |
          pytest tests/ backend/tests/ -v \
            --tb=short \
            --cov=backend --cov=fireai --cov=core \
            --cov-report=html:reports/coverage_html \
            --cov-report=term-missing \
            --cov-fail-under=5 \
            -x || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: reports/coverage_html/

  # ── Gate 3: Property-Based Tests ───────────────────────────────────────────
  property-tests:
    name: "Gate 3 — Property-Based Tests"
    runs-on: ubuntu-latest
    needs: test-suite
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio hypothesis

      - name: Run property-based tests
        run: |
          pytest tests/property_based/ -v --tb=short || true
          echo "Property-based tests completed"

  # ── Gate 4: Frontend Build ────────────────────────────────────────────────
  frontend-build:
    name: "Gate 4 — Frontend Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: frontend

      - name: Lint check
        working-directory: frontend
        run: |
          OUTPUT=$(npm run lint 2>&1)
          ERROR_COUNT=$(echo "$OUTPUT" | grep -oP '\d+(?= error)' | head -1 || echo "0")
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "FAIL: $ERROR_COUNT lint errors"
            exit 1
          fi
          echo "PASS: No lint errors"

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ── Gate 5: Dependency Audit ──────────────────────────────────────────────
  dependency-audit:
    name: "Gate 5 — Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        # ponytail: was `pip-audit -r requirements.txt ... || true`.
        # Two bugs fixed:
        #   1. `|| true` swallowed every vulnerability finding.
        #   2. `-r requirements.txt` made pip-audit re-resolve and re-build
        #      every dep in a fresh venv. requirements.txt pins numpy==1.24.3
        #      which cannot build on Python 3.12 (pkgutil.ImpImporter was
        #      removed in 3.12). Result: pip-audit crashed before it could
        #      report a single vulnerability. The actual deps come from
        #      pyproject.toml via `pip install -e .` above; requirements.txt
        #      is a stale partial list (only 11 packages) that does not
        #      reflect the real runtime dep tree.
        # New approach: `pip-audit` with no args scans the *currently
        # installed* environment (built from pyproject.toml). This is the
        # correct semantic — we want to audit what actually ships, not a
        # stale pin file. To suppress a specific advisory, use
        # `--ignore-vuln GHSA-xxxx "reason, see issue #N"`.
        run: |
          mkdir -p reports
          pip-audit --desc --progress-spinner off

      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm audit --audit-level=high || true

  # ── Gate 6: Docker Build ──────────────────────────────────────────────────
  docker-build:
    name: "Gate 6 — Docker Build & Test"
    runs-on: ubuntu-latest
    needs: [static-analysis, test-suite, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container
        run: |
          docker run -d --name test-app -p 8888:8000 ${{ steps.meta.outputs.tags }}
          sleep 5
          curl -f http://localhost:8888/health || exit 1
          docker stop test-app

  # ── Success Summary ────────────────────────────────────────────────────────
  success:
    name: "✅ All Gates Passed"
    runs-on: ubuntu-latest
    needs: [static-analysis, test-suite, property-tests, frontend-build, dependency-audit, docker-build]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "CI/CD Pipeline Summary:"
          echo "======================="
          echo "✅ Gate 1: Static Analysis"
          echo "✅ Gate 2: Test Suite"
          echo "✅ Gate 3: Property-Based Tests"
          echo "✅ Gate 4: Frontend Build"
          echo "✅ Gate 5: Dependency Audit"
          echo "✅ Gate 6: Docker Build & Test"
          echo ""
          echo "Pipeline completed successfully!"
