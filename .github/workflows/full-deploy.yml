name: Full Deployment Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - github
          - huggingface
          - render
          - langwatch

env:
  # GitHub Container Registry
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  
  # Repository info
  REPO_OWNER: ahmdelbaz28-ux
  REPO_NAME: revit
  ETAP_REPO: ahmdelbaz28-ux/ETAP-AI-WORK-.git
  
  # Hugging Face
  HF_SPACE_ID: ahmdelbaz28/AHMEDETAP
  
  # Render
  RENDER_SERVICE_ID: fireai
  
  # Version
  VERSION: ${{ github.sha }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # JOB 1: Test & Validate
  # ============================================================================
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff bandit mypy pytest pytest-cov pytest-asyncio hypothesis
          mkdir -p reports

      - name: Lint
        run: ruff check fireai/ qomn_conduit/ --exit-non-zero-on-fix

      - name: Type check
        run: mypy fireai/ qomn_conduit/ --ignore-missing-imports --no-strict-optional --exclude '.*test.*'

      - name: Security scan
        run: bandit -r fireai/ qomn_conduit/ -f json -o reports/bandit.json -ll

      - name: Unit tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=fireai --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=10 \
            --ignore=tests/test_workflow_service.py \
            --ignore=tests/test_workflow_service_v2.py

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run typecheck
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ============================================================================
  # JOB 2: Build & Push Docker Images
  # ============================================================================
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
            - dockerfile: deploy/docker/Dockerfile.api
              target: api
            - dockerfile: deploy/docker/Dockerfile.worker
              target: worker
            - dockerfile: deploy/docker/Dockerfile.nginx
              target: nginx
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{github.ref_name}}-latest,
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ============================================================================
  # JOB 3: Deploy to Hugging Face Spaces
  # ============================================================================
  deploy-huggingface:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          
          # Upload frontend build to Hugging Face Space
          api.upload_folder(
              folder_path='frontend-build',
              repo_id='${{ env.HF_SPACE_ID }}',
              repo_type='space',
              path_in_repo='.',
              commit_message='Auto-deploy from GitHub Actions - ${{ github.sha }}'
          )
          print('✅ Hugging Face deployment complete')
          "

  # ============================================================================
  # JOB 4: Deploy to Render
  # ============================================================================
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}'
          echo '✅ Render deployment triggered'

  # ============================================================================
  # JOB 5: Deploy to Kubernetes (Staging/Production)
  # ============================================================================
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build, deploy-huggingface, deploy-render]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    strategy:
      matrix:
        environment: [staging, production]
    environment:
      name: ${{ matrix.environment }}
      url: ${{ matrix.environment == 'production' && 'https://fireai.example.com' || 'https://staging.fireai.example.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if [ "${{ matrix.environment }}" == "production" ]; then
            echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          else
            echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          fi
          chmod 600 $HOME/.kube/config

      - name: Deploy Helm chart
        run: |
          helm upgrade --install fireai-${{ matrix.environment }} deploy/helm/fireai \
            --namespace fireai-${{ matrix.environment }} \
            --create-namespace \
            --set images.api.tag=${{ env.VERSION }} \
            --set images.worker.tag=${{ env.VERSION }} \
            --set images.nginx.tag=${{ env.VERSION }} \
            --set ingress.hosts[0].host=${{ matrix.environment == 'production' && 'fireai.example.com' || 'staging.fireai.example.com' }} \
            --set replicas.api=${{ matrix.environment == 'production' && '3' || '1' }} \
            --set secrets.fireai-secrets.stringData.FIREAI_API_KEY=${{ secrets.FIREAI_API_KEY }} \
            --set secrets.fireai-secrets.stringData.FIREAI_EVIDENCE_HMAC_KEY=${{ secrets.FIREAI_EVIDENCE_HMAC_KEY }} \
            --set secrets.fireai-secrets.stringData.GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --set secrets.fireai-secrets.stringData.ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }} \
            --set secrets.fireai-secrets.stringData.JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --set secrets.fireai-secrets.stringData.DB_PASSWORD=${{ secrets[matrix.environment == 'production' && 'DB_PASSWORD_PRODUCTION' || 'DB_PASSWORD_STAGING'] }} \
            --set secrets.fireai-secrets.stringData.REDIS_PASSWORD=${{ secrets[matrix.environment == 'production' && 'REDIS_PASSWORD_PRODUCTION' || 'REDIS_PASSWORD_STAGING'] }} \
            --wait --timeout 300s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/fireai-api -n fireai-${{ matrix.environment }} --timeout=180s
          kubectl rollout status deployment/fireai-worker -n fireai-${{ matrix.environment }} --timeout=180s
          echo "${{ matrix.environment }} deployment complete."

  # ============================================================================
  # JOB 6: Sync to ETAP-AI-WORK Repository
  # ============================================================================
  sync-etap:
    name: Sync to ETAP-AI-WORK Repository
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Clone ETAP-AI-WORK repository
        env:
          ETAP_TOKEN: ${{ secrets.ETAP_TOKEN }}
        run: |
          git clone https://$ETAP_TOKEN@github.com/${{ env.ETAP_REPO }} etap-repo
          cd etap-repo
          git checkout main || git checkout master
          
      - name: Sync files
        run: |
          # Copy updated files to ETAP repo
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='__pycache__' \
            ./ etap-repo/
          
          cd etap-repo
          git add -A
          git diff --cached --quiet || git commit -m "Sync from revit repo - ${{ github.sha }}"
          git push origin main || git push origin master
          echo '✅ Synced to ETAP-AI-WORK repository'

  # ============================================================================
  # JOB 7: Notify All Services
  # ============================================================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-huggingface, deploy-render, deploy-k8s, sync-etap]
    if: always()
    steps:
      - name: Check all deployments
        run: |
          echo "Deployment Summary:"
          echo "HuggingFace: ${{ needs.deploy-huggingface.result }}"
          echo "Render: ${{ needs.deploy-render.result }}"
          echo "Kubernetes: ${{ needs.deploy-k8s.result }}"
          echo "ETAP Sync: ${{ needs.sync-etap.result }}"
          
      - name: Notify success
        if: |
          needs.deploy-huggingface.result == 'success' ||
          needs.deploy-render.result == 'success' ||
          needs.deploy-k8s.result == 'success'
        run: |
          echo "✅ At least one deployment successful!"
          
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1