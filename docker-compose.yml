# ═══════════════════════════════════════════════════════════════════════════
# FireAI — Docker Compose for Development and Testing
# ═══════════════════════════════════════════════════════════════════════════

services:
  fireai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireai-api
    ports:
      - "8000:8000"
    environment:
      - FIREAI_ENV=${FIREAI_ENV:-production}
      - FIREAI_API_KEY=${FIREAI_API_KEY:?ERROR: FIREAI_API_KEY must be set}
      - FIREAI_SESSION_SECRET=${FIREAI_SESSION_SECRET:?ERROR: FIREAI_SESSION_SECRET must be set (generate with: python3 -c "import secrets; print(secrets.token_urlsafe(64))")}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/fireai.db}
      - UDM_DB_PATH=${UDM_DB_PATH:-/app/data/udm_elements.db}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CSP_UNSAFE_EVAL=${CSP_UNSAFE_EVAL:-false}
      - CSP_CONNECT_SRC=${CSP_CONNECT_SRC:-http://localhost:5173 ws://localhost:5173 http://localhost:8000}
      - FIREAI_DATA_DIRS=${FIREAI_DATA_DIRS:-/tmp/fireai_uploads:/data:/uploads}
      - FIREAI_ALLOWED_UPLOAD_DIRS=${FIREAI_ALLOWED_UPLOAD_DIRS:-/tmp:/var/tmp:/var/fireai/uploads}
      - FIREAI_DWG_MAX_FILE_SIZE_BYTES=${FIREAI_DWG_MAX_FILE_SIZE_BYTES:-104857600}
    volumes:
      - fireai-data:/app/data
      - fireai-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: fireai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ── V141: Qdrant — Vector Database for AI Semantic Memory ──────────────
  # Provides RAG capabilities for 24+ AI agents. Without this, every
  # question is treated as if heard for the first time.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fireai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - fireai-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── V141: Neo4j — Graph Database for Network Topology ──────────────────
  # Provides topology awareness for electrical networks.
  # "If I trip this breaker, which loads are affected?" — answered in <10ms.
  neo4j:
    image: neo4j:5-community
    container_name: fireai-neo4j
    environment:
      - NEO4J_AUTH=neo4j/etap_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=512M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - fireai-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ── V140 Phase 10: DocTR OCR Service ──────────────────────────────────
  # Provides OCR with bounding boxes for scanned floor plans.
  # Optional — FireAI falls back to Tesseract if this service is unavailable.
  doctr-ocr:
    build:
      context: ./services/doctr
      dockerfile: Dockerfile
    container_name: fireai-doctr
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    profiles:
      - document-intelligence

  # ── V140 Phase 10: YOLO Segmentation Service ──────────────────────────
  # Provides layout analysis for floor plan images.
  # Optional — FireAI falls back to OpenCV contours if unavailable.
  yolo-segmentation:
    build:
      context: ./services/yolo
      dockerfile: Dockerfile
    container_name: fireai-yolo
    ports:
      - "8002:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    profiles:
      - document-intelligence

volumes:
  fireai-data:
    driver: local
  fireai-logs:
    driver: local
  redis-data:
    driver: local
  qdrant-storage:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
