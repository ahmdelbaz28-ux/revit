# ═══════════════════════════════════════════════════════════════════════════
# FireAI — Docker Compose for Development and Testing
# ═══════════════════════════════════════════════════════════════════════════

services:
  fireai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireai-api
    ports:
      - "8000:8000"
    environment:
      - FIREAI_ENV=${FIREAI_ENV:-production}
      - FIREAI_API_KEY=${FIREAI_API_KEY:?ERROR: FIREAI_API_KEY must be set}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/digital_twin.db}
      - UDM_DB_PATH=${UDM_DB_PATH:-/app/data/udm_elements.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - CSP_UNSAFE_EVAL=${CSP_UNSAFE_EVAL:-false}
      - CSP_CONNECT_SRC=${CSP_CONNECT_SRC:-http://localhost:5173 ws://localhost:5173 http://localhost:8000}
      - FIREAI_DATA_DIRS=${FIREAI_DATA_DIRS:-/tmp/fireai_uploads:/data:/uploads}
      - FIREAI_ALLOWED_UPLOAD_DIRS=${FIREAI_ALLOWED_UPLOAD_DIRS:-/tmp:/var/tmp:/var/fireai/uploads}
      - FIREAI_DWG_MAX_FILE_SIZE_BYTES=${FIREAI_DWG_MAX_FILE_SIZE_BYTES:-104857600}
    volumes:
      - fireai-data:/app/data
      - fireai-logs:/app/logs
      - ./db:/app/db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: fireai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  fireai-data:
    driver: local
  fireai-logs:
    driver: local
  redis-data:
    driver: local
