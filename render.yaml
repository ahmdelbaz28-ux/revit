# V243 FIX: Corrected environment variable names and added required secrets.
# - CORS_ORIGINS → CORS_ALLOWED_ORIGINS (matches backend/security_middleware.py)
# - Added FIREAI_SESSION_SECRET (backend hard-fails without it)
# - Updated repo URL to the correct GitHub repository
services:
  - type: web
    name: bazspark
    runtime: docker
    repo: https://github.com/ahmdelbaz28-ux/BAZspark
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FIREAI_ENV
        value: production
      - key: FIREAI_API_KEY
        sync: false
      # V243 FIX: Correct env var name — backend reads CORS_ALLOWED_ORIGINS
      - key: CORS_ALLOWED_ORIGINS
        value: https://bazspark.onrender.com
      - key: CSP_CONNECT_SRC
        value: https://bazspark.onrender.com wss://bazspark.onrender.com
      # V243 FIX: Required — backend hard-fails at startup without this.
      # Generate with: python3 -m backend.session_secret generate
      - key: FIREAI_SESSION_SECRET
        sync: false
      # Optional: Supabase (for REST data layer)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    healthCheckPath: /api/health
