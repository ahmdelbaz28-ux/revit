# .pre-commit-config.yaml — Quality Gates & Automation
# ===================================================
#
# Production-ready pre-commit hooks following best practices.
# Implements multi-stage quality gates for code, tests, and security.
#
# USAGE:
#   pre-commit install
#   pre-commit run --all-files

repos:
  # Stage 1: Code Quality & Formatting
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Run ruff formatter
      - id: ruff-format
        types_or: [python]
      
      # Run ruff linter with auto-fix
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python]

  # Stage 2: Type Checking
  - repo: local
    hooks:
      - id: type-check
        name: type check
        entry: mypy
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        args: ["--package", "backend", "--package", "core", "--package", "skills"]

  # Stage 3: Security Scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: security scan
        args: [-r, -ll, --skip, "B101,B311"]  # Skip harmless low-severity issues
        types: [python]

  # Stage 4: Testing
  - repo: local
    hooks:
      # Fast unit tests
      - id: fast-unit-tests
        name: fast unit tests
        entry: python -m pytest tests/test_*.py -x --tb=short
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [push]

      # Property-based tests
      - id: property-tests
        name: property-based tests
        entry: python -m pytest tests/property_based/ -v --tb=short
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [push]

  # Stage 5: Skill Validation
  - repo: local
    hooks:
      - id: validate-skill-schemas
        name: validate skill schemas
        entry: python -c "from skills.skill_validator import SkillDescription; print('Skill validator loaded successfully')"
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]

  # Stage 6: General Code Quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Check for files that would conflict with GitHub's LFS
      - id: check-added-large-files
        args: ['--maxkb=500']

      # Check for broken symlinks
      - id: check-symlinks

      # Check for merge conflicts
      - id: check-merge-conflict

      # Check for mixed line feeds
      - id: mixed-line-ending
        args: [--fix=lf]

      # Trim trailing whitespace
      - id: trailing-whitespace
        exclude: \.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|zip|tar|gz|exe|bin|woff|woff2)$

      # Ensure files end with a newline
      - id: end-of-file-fixer
        exclude: \.(jpg|jpeg|png|gif|pdf|doc|docx|xls|xlsx|zip|tar|gz|exe|bin|woff|woff2)$

      # Check YAML validity
      - id: check-yaml
        exclude: .github/workflows/.*

      # Check JSON validity
      - id: check-json

      # Check TOML validity
      - id: check-toml

  # Stage 7: License Header Check (if applicable)
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.4
    hooks:
      - id: insert-license
        files: \.py$
        args: [
          --license-filepath,
          LICENSE,
          --comment-style,
          #,
          --allow-pseudo-licenses
        ]

# Configuration for the entire pre-commit system
default_language_version:
  python: python3.8

default_stages: [commit]

# Additional configuration
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
