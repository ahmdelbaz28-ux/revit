version: '3.8'

services:
  db:
    image: postgres:15
    container_name: firealarm-db
    environment:
      # Security Fix (VULN-001): Use env var references instead of hardcoded credentials
      POSTGRES_USER: ${POSTGRES_USER:-firealarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-firealarmdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Security Fix (VULN-032): Do not expose DB port to host; use internal Docker networking
    # If needed for development, bind to localhost only:
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firealarm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: fire-alarm-db/Dockerfile
    container_name: firealarm-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Security Fix (VULN-001): Use env var references instead of hardcoded URL
      DATABASE_URL: postgresql://${POSTGRES_USER:-firealarm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-firealarmdb}
      MODEL_PATH: ./best.pt
      # Security Fix (VULN-004): Bind to localhost by default; use reverse proxy in production
      HOST: ${HOST:-127.0.0.1}
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./fire-alarm-db:/app/fire-alarm-db
    restart: unless-stopped

volumes:
  postgres_data:
