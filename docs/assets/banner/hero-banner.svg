<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1400" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="25%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="75%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4500"/>
      <stop offset="30%" stop-color="#ff6b35"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4500" stop-opacity="0"/>
      <stop offset="15%" stop-color="#ff4500" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="85%" stop-color="#3b82f6" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#8b5cf6" stop-opacity=".5"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity=".7"/>
      <stop offset="80%" stop-color="#10b981" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4500" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="380" fill="url(#bgMain)" rx="16"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1400" height="5" fill="url(#topLine)" rx="2"/>
  <!-- Bottom accent line -->
  <rect x="0" y="375" width="1400" height="5" fill="url(#bottomLine)" rx="2"/>

  <!-- Subtle grid pattern -->
  <g opacity=".03">
    <line x1="0" y1="0" x2="0" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="380" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="50" x2="1400" y2="50" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1400" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1400" y2="150" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1400" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1400" y2="250" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1400" y2="300" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1400" y2="350" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glow behind logo -->
  <ellipse cx="120" cy="150" rx="80" ry="80" fill="url(#glowGrad)" opacity=".4"/>

  <!-- Shield/Logo -->
  <g transform="translate(120, 150)" filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="url(#fireGrad)" stroke-width="3" opacity=".6"/>
    <!-- Inner ring animated dashes -->
    <circle cx="0" cy="0" r="54" fill="none" stroke="url(#fireGrad)" stroke-width="1.5" stroke-dasharray="12 6" opacity=".4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </circle>
    <!-- Shield shape -->
    <path d="M0,-42 L32,-24 L32,10 L0,38 L-32,10 L-32,-24 Z" fill="url(#shieldGrad)" opacity=".9" stroke="#ff6b35" stroke-width="2"/>
    <!-- Fire icon inside shield -->
    <text x="0" y="8" fill="#fbbf24" font-size="32" font-weight="900" text-anchor="middle" dominant-baseline="middle">🔥</text>
  </g>

  <!-- Product Name with gradient -->
  <text x="220" y="105" fill="url(#fireGrad)" font-size="52" font-weight="900" letter-spacing="-2" filter="url(#glow)">FireAI</text>

  <!-- Subtitle -->
  <text x="222" y="145" fill="#e2e8f0" font-size="26" font-weight="600" letter-spacing="1">Digital Twin Platform</text>

  <!-- Version badge -->
  <rect x="222" y="160" width="70" height="22" rx="11" fill="#064e3b" stroke="#34d399" stroke-width="1"/>
  <text x="257" y="175" fill="#6ee7b7" font-size="10" text-anchor="middle" font-weight="600">v1.0.0</text>

  <!-- Description -->
  <text x="222" y="210" fill="#94a3b8" font-size="15" font-weight="400">
    Engineering Intelligence Platform for CAD, BIM, Compliance,
  </text>
  <text x="222" y="232" fill="#94a3b8" font-size="15" font-weight="400">
    Electrical Engineering, Fire Protection &amp; Digital Twin Workflows
  </text>

  <!-- Feature badges row 1 -->
  <rect x="222" y="255" width="110" height="28" rx="14" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <text x="277" y="274" fill="#7dd3fc" font-size="11" text-anchor="middle" font-weight="600">72+ Endpoints</text>

  <rect x="342" y="255" width="105" height="28" rx="14" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="394" y="274" fill="#93c5fd" font-size="11" text-anchor="middle" font-weight="600">5,907 Tests</text>

  <rect x="457" y="255" width="100" height="28" rx="14" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="507" y="274" fill="#c4b5fd" font-size="11" text-anchor="middle" font-weight="600">AI-Powered</text>

  <rect x="567" y="255" width="105" height="28" rx="14" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <text x="619" y="274" fill="#fde68a" font-size="11" text-anchor="middle" font-weight="600">Open Source</text>

  <!-- Feature badges row 2 -->
  <rect x="222" y="292" width="95" height="28" rx="14" fill="#450a0a" stroke="#f87171" stroke-width="1"/>
  <text x="269" y="311" fill="#fca5a5" font-size="11" text-anchor="middle" font-weight="600">NFPA 72</text>

  <rect x="327" y="292" width="95" height="28" rx="14" fill="#172554" stroke="#818cf8" stroke-width="1"/>
  <text x="374" y="311" fill="#a5b4fc" font-size="11" text-anchor="middle" font-weight="600">NEC 2023</text>

  <rect x="432" y="292" width="95" height="28" rx="14" fill="#052e16" stroke="#4ade80" stroke-width="1"/>
  <text x="479" y="311" fill="#86efac" font-size="11" text-anchor="middle" font-weight="600">UL 864</text>

  <rect x="537" y="292" width="95" height="28" rx="14" fill="#3b0764" stroke="#c084fc" stroke-width="1"/>
  <text x="584" y="311" fill="#d8b4fe" font-size="11" text-anchor="middle" font-weight="600">ATEX/IEC</text>

  <rect x="642" y="292" width="95" height="28" rx="14" fill="#0f172a" stroke="#94a3b8" stroke-width="1"/>
  <text x="689" y="311" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="600">IBC</text>

  <!-- Right side: Stats panel -->
  <g transform="translate(880, 30)">
    <rect x="0" y="0" width="480" height="320" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity=".8"/>

    <!-- Stats header -->
    <text x="240" y="35" fill="#58a6ff" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="2">PLATFORM STATS</text>
    <line x1="30" y1="50" x2="450" y2="50" stroke="#1e293b" stroke-width="1"/>

    <!-- Stats grid -->
    <text x="40" y="80" fill="#3fb950" font-size="28" font-weight="800">5,907</text>
    <text x="40" y="98" fill="#8b949e" font-size="11">Tests Passed</text>

    <text x="180" y="80" fill="#58a6ff" font-size="28" font-weight="800">72+</text>
    <text x="180" y="98" fill="#8b949e" font-size="11">API Endpoints</text>

    <text x="320" y="80" fill="#d2a8ff" font-size="28" font-weight="800">17</text>
    <text x="320" y="98" fill="#8b949e" font-size="11">Router Modules</text>

    <line x1="30" y1="115" x2="450" y2="115" stroke="#1e293b" stroke-width="1"/>

    <!-- Architecture layers -->
    <text x="40" y="140" fill="#f0883e" font-size="11" font-weight="700">▸ PRESENTATION</text>
    <text x="200" y="140" fill="#8b949e" font-size="10">React SPA + Electron</text>

    <text x="40" y="162" fill="#58a6ff" font-size="11" font-weight="700">▸ ANALYTICS</text>
    <text x="200" y="162" fill="#8b949e" font-size="10">Predictive + ML Pipeline</text>

    <text x="40" y="184" fill="#d2a8ff" font-size="11" font-weight="700">▸ AI AGENTS</text>
    <text x="200" y="184" fill="#8b949e" font-size="10">Learning + LangGraph Workflow</text>

    <text x="40" y="206" fill="#3fb950" font-size="11" font-weight="700">▸ ENGINEERING</text>
    <text x="200" y="206" fill="#8b949e" font-size="10">NFPA 72 + NEC + Acoustics</text>

    <text x="40" y="228" fill="#79c0ff" font-size="11" font-weight="700">▸ CORE</text>
    <text x="200" y="228" fill="#8b949e" font-size="10">UDM + Digital Twin + SQLite</text>

    <text x="40" y="250" fill="#f87171" font-size="11" font-weight="700">▸ INTEGRATION</text>
    <text x="200" y="250" fill="#8b949e" font-size="10">Revit + AutoCAD + IFC + BIM</text>

    <text x="40" y="272" fill="#fbbf24" font-size="11" font-weight="700">▸ EXTERNAL</text>
    <text x="200" y="272" fill="#8b949e" font-size="10">Weather + Geocoding + WAQI + NWS</text>

    <line x1="30" y1="288" x2="450" y2="288" stroke="#1e293b" stroke-width="1"/>

    <!-- Safety badge -->
    <rect x="140" y="296" width="200" height="18" rx="9" fill="#450a0a" stroke="#f87171" stroke-width="1"/>
    <text x="240" y="309" fill="#fca5a5" font-size="9" text-anchor="middle" font-weight="600">SAFETY-CRITICAL SYSTEM</text>
  </g>
</svg>
