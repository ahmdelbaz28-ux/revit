[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "cad-bim-integration-platform"
dynamic = ["version"]
description = "Complete platform for AutoCAD and Revit integration with Digital Twin capabilities"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [{name = "FireAI Project", email = "contact@fireai.org"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed"
]
keywords = ["cad", "bim", "revit", "autocad", "digital-twin", "engineering", "integration"]
dependencies = [
    "fastapi>=0.100.0,<1.0.0",
    "uvicorn[standard]>=0.20.0,<1.0.0",
    "pydantic>=2.0.0,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "slowapi>=0.1.9,<1.0.0",
    "sqlalchemy>=2.0.0,<3.0.0",
    "psycopg2-binary>=2.9.0,<3.0.0",
    "alembic>=1.10.0,<2.0.0",
    "python-multipart>=0.0.6,<1.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "requests>=2.28.0,<3.0.0",
    "pyjwt[crypto]>=2.6.0,<3.0.0",
    "passlib[bcrypt]>=1.7.0,<2.0.0",
    "cryptography>=41.0.0,<43.0.0",
    "websockets>=10.0.0,<12.0.0",
    "asyncpg>=0.27.0,<1.0.0",
    "redis>=4.5.0,<5.0.0",
    "celery>=5.2.0,<6.0.0",
    "redis[hiredis]>=4.5.0,<5.0.0",
    "python-dateutil>=2.8.0,<3.0.0",
    "pytz>=2023.0.0,<2025.0.0",
    "pywin32>=306;platform_system=='Windows'",
    "pythonnet>=3.0.0rc1;platform_system=='Windows'",
    "tenacity>=8.2.0,<9.0.0",
    "hypothesis>=6.82.0,<7.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0,<8.0.0",
    "pytest-asyncio>=0.21.0,<1.0.0",
    "pytest-cov>=4.0.0,<5.0.0",
    "black>=23.0.0,<24.0.0",
    "flake8>=6.0.0,<7.0.0",
    "mypy>=1.0.0,<2.0.0",
    "ruff>=0.1.0,<1.0.0",
    "pre-commit>=3.0.0,<4.0.0",
    "bandit>=1.7.0,<2.0.0",
    "safety>=2.0.0,<3.0.0",
    "types-requests>=2.28.0,<3.0.0",
    "types-python-dateutil>=2.8.0,<3.0.0",
]
docs = [
    "mkdocs>=1.4.0,<2.0.0",
    "mkdocs-material>=9.0.0,<10.0.0",
    "mkdocstrings[python]>=0.22.0,<1.0.0",
]

[project.scripts]
fireai-server = "fireai.cli:main"
fireai-cli = "fireai.cli:cli_main"

[project.urls]
Homepage = "https://github.com/fireai/platform"
Documentation = "https://fireai.org/docs"
Repository = "https://github.com/fireai/platform.git"
Changelog = "https://github.com/fireai/platform/blob/main/CHANGELOG.md"
"Issue Tracker" = "https://github.com/fireai/platform/issues"
"Twitter" = "https://twitter.com/fireai_platform"
"LinkedIn" = "https://linkedin.com/company/fireai-platform"

[tool.setuptools_scm]

[tool.black]
line-length = 88
target-version = ['py38']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
disallow_untyped_decorators = false
show_error_codes = true
exclude = ["venv/", ".venv/", "env/", ".env/", "skills/ppt/scripts/pdf.py"]
ignore_missing_imports = true
disallow_subclassing_any = false
no_implicit_optional = false


[[tool.mypy.overrides]]
module = ["pywin32.*", "pythonnet.*", "clr.*", "Autodesk.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["skills/ppt/scripts/pdf"]
ignore = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--tb=short",
    "--disable-warnings",
    "--showlocals",
    "--verbose"
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "safety_critical: marks tests as safety-critical",
    "security: marks tests as security-related",
    "compliance: marks tests as compliance-related",
    "asyncio: marks tests as asyncio-related"
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
    "ignore::FutureWarning"
]
norecursedirs = [".git", "__pycache__", "venv", "env", "revit-main", "facp_distributed"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/env/*",
    "*/.env/*"
]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == '__main__':"
]

[tool.bandit]
targets = ["fireai", "tests"]
exclude_dirs = [".git", "__pycache__", "venv", "env"]
skips = ["B101", "B102"]  # Skip "assert used" and "exec used" for testing purposes

[tool.ruff]
extend-exclude = ["fireai/tools/*.py", "fireai/conduit/fill.py", "skills/ppt/ooxml/scripts/*.py"]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings  
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "SIM",   # flake8-simplify
    "PGH",   # pygrep-hooks
    "PL",    # pylint
    "PT",    # flake8-pytest-style
    "RUF",   # Ruff-specific rules
    "ANN",   # typing: Any, NoReturn, etc.
    "BLE",   # boolean expression length
    "RET",   # return statement practices
    "D",     # pydocstyle
]
ignore = [
    "D",     # pydocstyle - all docstring rules
    "DTZ005",  # datetime.now() called without tz argument
    "BLE001",  # Do not catch blind exception - intentional for API robustness
    "ANN001",  # Missing type annotation
    "ANN002",  # Missing type annotation
    "ANN003",  # Missing type annotation
    "ANN201",  # Missing return type on public function
    "ANN204",  # Missing return type annotation for __init__
    "ANN205",  # Missing return type annotation
    "ANN206",  # Missing return type annotation
    "ANN401",  # Dynamically typed expression - internal use
    "ANN202",  # Missing return type annotation
    "SIM102",  # Use if/else instead of ternary
    "SIM103",  # Use ternary instead of if-else-return
    "SIM105",  # try-except-pass pattern - intentional for entity retrieval
    "SIM108",  # Use ternary instead of if-else
    "SIM110",  # Use any() instead of for loop
    "SIM114",  # enumerate has duplicate value
    "SIM117",  # Use itertools.chain
    "SIM118",  # Use key in dict instead of key in dict.keys()
    "PLC0207",  # string is split more times than necessary
    "PLC0415",  # from imports - required for package structure
    "UP006",  # Use `dict` instead of `Dict` - legacy typing style
    "UP012",  # Unnecessary UTF-8 encoding argument
    "UP015",  # Unnecessary mode argument
    "UP032",  # Use f-string instead of format call
    "UP037",  # Use `list` instead of `list` builtin
    "UP045",  # Use `typing_extensions.TypeAlias` for type aliases
    "W291",  # Trailing whitespace
    "W292",  # No newline at end of file
    "W293",  # Blank line contains whitespace
    "E402",  # Module level import not at top of file
    "E501",  # Line too long (handled by formatter)
    "E701",  # Multiple statements on one line
    "E722",  # bare except
    "E741",  # Ambiguous variable name
    "F401",  # Module imported but unused
    "F811",  # undefined name
    "F821",  # undefined name
    "I001",  # Import needs sorting
    "N803",  # argument name should be lowercase
    "N806",  # variable in function should be lowercase
    "N814",  # constant name should be lowercase
    "N815",  # constant name should be SCREAMING_SNAKE_CASE
    "N817",  # constant name should be SCREAMING_SNAKE_CASE
    "N818",  # constant name should be SCREAMING_SNAKE_CASE
    "B007",  # loop control variable
    "B008",  # default exception clause
    "B904",  # try-except-raise
    "RUF001",  # string statement has no effect
    "RUF002",  # constant should be lowercase
    "RUF003",  # octal value without 0o prefix
    "RUF006",  # Store a reference to the return value
    "RUF010",  # Use explicit conversion flag
    "RUF012",  # Mutable default value for class attribute
    "RUF013",  # implicit optional
    "RUF022",  # i control variable
    "RUF043",  # Pattern passed to match= contains metacharacters
    "RUF046",  # Value being cast to int is already an integer
    "RUF059",  # load before checking
    "RUF100",  # Unused noqa directive
    "PGH003",  # Use specific rule codes when ignoring type issues
    "RUF019",  # Unnecessary key check before dictionary access
    "PLR",   # Design related pylint codes
    "PLW0602",  # Using global for but no assignment is done
    "PLW0603",  # global-at-module-level
    "PLW1510",  # subprocess call without check
    "PLW2901",  # Outer for loop shadowed
    "RET504",  # Unnecessary variable assignment
    "RET505",  # Unnecessary variable assignment
    "RET507",  # Unnecessary elif after continue
    "RET508",  # Unnecessary elif after break
    "PT001",  # Use @pytest.fixture over @pytest.fixture()
    "PT009",  # legacy assertion syntax
    "PT011",  # pytest raise in except block
    "PT017",  # Found assertion on exception
    "PT018",  # Assertion should be broken down into multiple parts
    "PT027",  # pytest raises does not match
    "F841",  # Unused variable
    "N801",  # Function name should be lowercase
    "N802",  # Function name should be lowercase
    "F541",  # f-string without interpolation
    "SIM116",  # Use a dictionary instead of consecutive if statements
    "PLC0414",  # Import alias does not rename original package
    "UP007",  # Use X | Y for type annotations
    "PLE0605",  # Invalid format for __all__
    "RUF005",  # Consider iterable unpacking instead of concatenation
    "RUF023",  # __slots__ is not sorted
    "RUF034",  # Useless if-else condition
    "DTZ003",  # datetime.utcnow() used
    "DTZ007",  # datetime.replace() called without a tz argument
    "PLW0108",  # Lambda may be unnecessary
    "SIM115",  # Use a context manager for opening files
    "SIM222",  # Yoda condition
    "SIM300",  # Yoda condition
    "UP031",  # Unnecessary key argument
    "B005",  # Loop control variable
    "UP009",  # UTF-8 encoding declaration is unnecessary
    "RUF015",  # Stray type annotation
    "RET503",  # Unnecessary variable assignment
    "RET506",  # Unnecessary variable assignment
    "RUF021",  # Stray type annotation
]

[tool.ruff.lint.per-file-ignores]
"*__init__.py" = ["F401"]
"tests/*" = ["ANN", "S", "T"]
"backend/__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["backend", "core", "parsers", "fireai", "skills", "qomn_conduit", "db", "tests", "facp"]
known-third-party = ["fastapi", "uvicorn", "pydantic", "sqlalchemy", "alembic", "requests", "pyjwt", "passlib", "cryptography", "websockets", "asyncpg", "redis", "celery", "python_dateutil", "pytz", "pywin32", "pythonnet", "tenacity", "hypothesis", "pytest", "black", "flake8", "mypy", "ruff", "pre_commit", "bandit", "safety", "types_requests", "types_python_dateutil", "mkdocs", "mkdocs_material", "mkdocstrings", "numpy", "scipy", "shapely"]