[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fireai"
version = "1.0.0"
description = "FireAI: Advanced AI-powered fire protection engineering platform for mission-critical safety systems"
readme = "README.md"
license = {file = "LICENSE"}
authors = [
    {name = "FireAI Team", email = "engineering@fireai.org"}
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Other Audience",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Topic :: Security",
    "Typing :: Typed"
]
keywords = ["fire-protection", "engineering", "safety", "ai", "compliance", "nfpa"]
requires-python = ">=3.12"
dependencies = [
    "psutil>=5.8.0",
    "shapely>=2.0.0",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "pydantic>=2.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "sqlalchemy>=2.0.0",
    "pyyaml>=6.0",
    "requests>=2.28.0",
    "python-multipart>=0.0.6",
    "pyjwt>=2.6.0",
    "passlib>=1.7.4",
    "bcrypt>=4.0.0",
    "python-dotenv>=1.0.0",
    "alembic>=1.10.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "isort>=5.10.0",
    "pre-commit>=3.0.0",
    "tox>=4.0.0",
    "virtualenv>=20.0.0",
    "pip-tools>=7.0.0",
    "bandit>=1.7.0",
    "safety>=2.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
    "black>=23.0.0",
    "flake8>=6.0.0",
    "isort>=5.10.0",
    "pre-commit>=3.0.0",
    "tox>=4.0.0",
    "virtualenv>=20.0.0",
    "pip-tools>=7.0.0",
    "bandit>=1.7.0",
    "safety>=2.0.0",
    "pdbpp>=0.10.3",
    "ipdb>=0.13.9"
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.10.0",
    "factory-boy>=3.2.0",
    "faker>=18.0.0"
]
docs = [
    "sphinx>=6.0.0",
    "sphinx-rtd-theme>=1.0.0",
    "sphinx-autodoc-typehints>=1.19.0",
    "myst-parser>=1.0.0",
    "sphinx-copybutton>=0.5.0"
]
cad = [
    "ezdxf>=1.0.0",
    "ifcopenshell>=0.7.0",
    "opencascade>=7.6.0",
    "python-opencv>=4.5.0"
]

[project.scripts]
fireai-server = "fireai.cli:main"
fireai-cli = "fireai.cli:cli_main"

[project.urls]
Homepage = "https://github.com/fireai/platform"
Documentation = "https://fireai.org/docs"
Repository = "https://github.com/fireai/platform.git"
Changelog = "https://github.com/fireai/platform/blob/main/CHANGELOG.md"
"Issue Tracker" = "https://github.com/fireai/platform/issues"
"Twitter" = "https://twitter.com/fireai_platform"
"LinkedIn" = "https://linkedin.com/company/fireai-platform"

[tool.setuptools.packages.find]
where = ["."]
include = ["fireai*", "facp*"]

[tool.setuptools.package-data]
fireai = ["py.typed", "data/*", "schemas/*"]

[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | venv
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
known_first_party = ["fireai", "facp"]
known_third_party = ["numpy", "scipy", "shapely", "pydantic", "fastapi", "sqlalchemy", "pytest", "requests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = [".git", "__pycache__", "venv", "env", "revit-main", "facp_distributed"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--showlocals",
    "--verbose",
    "--tb=short"
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "safety_critical: marks tests as safety-critical",
    "compliance: marks tests as compliance-related"
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
    "ignore::FutureWarning"
]

[tool.coverage.run]
source = ["fireai"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/venv/*",
    "*/env/*",
    "setup.py"
]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:"
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
namespace_packages = true
mypy_path = ["stubs"]

[tool.bandit]
targets = ["fireai", "tests"]
exclude_dirs = [".git", "__pycache__", "venv", "env"]
skips = ["B101", "B102"]  # Skip "assert used" and "exec used" for testing purposes

[tool.ruff]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
line-length = 88
target-version = "py312"

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py
"tests/*" = ["S101", "S106", "S107"]  # Allow assert, hardcoded passwords/credentials in tests