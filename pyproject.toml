[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "cad-bim-integration-platform"
dynamic = ["version"]
description = "Complete platform for AutoCAD and Revit integration with Digital Twin capabilities"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [{name = "FireAI Project", email = "contact@fireai.org"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed"
]
keywords = ["cad", "bim", "revit", "autocad", "digital-twin", "engineering", "integration"]
dependencies = [
    "fastapi>=0.100.0,<1.0.0",
    "uvicorn[standard]>=0.20.0,<1.0.0",
    "pydantic>=2.0.0,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    "slowapi>=0.1.9,<1.0.0",
    "sqlalchemy>=2.0.0,<3.0.0",
    "psycopg2-binary>=2.9.0,<3.0.0",
    "alembic>=1.10.0,<2.0.0",
    "python-multipart>=0.0.6,<1.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "requests>=2.28.0,<3.0.0",
    "pyjwt[crypto]>=2.6.0,<3.0.0",
    "passlib[bcrypt]>=1.7.0,<2.0.0",
    "cryptography>=41.0.0,<43.0.0",
    "websockets>=10.0.0,<12.0.0",
    "asyncpg>=0.27.0,<1.0.0",
    "redis>=4.5.0,<5.0.0",
    "celery>=5.2.0,<6.0.0",
    "redis[hiredis]>=4.5.0,<5.0.0",
    "python-dateutil>=2.8.0,<3.0.0",
    "pytz>=2023.0.0,<2025.0.0",
    "pywin32>=306;platform_system=='Windows'",
    "pythonnet>=3.0.0rc1;platform_system=='Windows'",
    "tenacity>=8.2.0,<9.0.0",
    "hypothesis>=6.82.0,<7.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0,<8.0.0",
    "pytest-asyncio>=0.21.0,<1.0.0",
    "pytest-cov>=4.0.0,<5.0.0",
    "black>=23.0.0,<24.0.0",
    "flake8>=6.0.0,<7.0.0",
    "mypy>=1.0.0,<2.0.0",
    "ruff>=0.1.0,<1.0.0",
    "pre-commit>=3.0.0,<4.0.0",
    "bandit>=1.7.0,<2.0.0",
    "safety>=2.0.0,<3.0.0",
    "types-requests>=2.28.0,<3.0.0",
    "types-python-dateutil>=2.8.0,<3.0.0",
]
docs = [
    "mkdocs>=1.4.0,<2.0.0",
    "mkdocs-material>=9.0.0,<10.0.0",
    "mkdocstrings[python]>=0.22.0,<1.0.0",
]

[project.scripts]
fireai-server = "fireai.cli:main"
fireai-cli = "fireai.cli:cli_main"

[project.urls]
Homepage = "https://github.com/fireai/platform"
Documentation = "https://fireai.org/docs"
Repository = "https://github.com/fireai/platform.git"
Changelog = "https://github.com/fireai/platform/blob/main/CHANGELOG.md"
"Issue Tracker" = "https://github.com/fireai/platform/issues"
"Twitter" = "https://twitter.com/fireai_platform"
"LinkedIn" = "https://linkedin.com/company/fireai-platform"

[tool.setuptools_scm]

[tool.black]
line-length = 88
target-version = ['py38']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
show_error_codes = true
exclude = ["venv/", ".venv/", "env/", ".env/"]

[[tool.mypy.overrides]]
module = ["pywin32.*", "pythonnet.*", "clr.*", "Autodesk.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
# V130 FIX: Expanded testpaths from ["tests"] to include ALL test directories.
# Previously, 95 of 144 test_*.py files were silently skipped by default pytest
# invocation — including the entire safety-critical fireai/core/tests/ kernel
# (1131+ tests covering NFPA 72, voltage drop, battery sizing, audit chain).
testpaths = [
    "tests",
    "backend/tests",
    "fireai/conduit/tests",
    "fireai/core/tests",
    "parsers/tests",
    "qomn_conduit/tests",
    "qomn_fire/tests",
    "core/tests",
    "facp_distributed/tests",
]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--tb=short",
    "--disable-warnings",
    "--showlocals",
    "--verbose"
]
markers = [
    "slow: marks tests as slow",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "safety_critical: marks tests as safety-critical",
    "security: marks tests as security-related",
    "compliance: marks tests as compliance-related",
    "asyncio: marks tests as asyncio-related"
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
    "ignore::FutureWarning"
]
norecursedirs = [".git", "__pycache__", "venv", "env", "revit-main", "facp_distributed"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/env/*",
    "*/.env/*"
]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == '__main__':"
]
# V130 FIX: Enforce minimum coverage on critical paths so coverage cannot
# drop silently. 70% is a conservative floor — raise to 80% after the
# remediation plan in the audit report is completed.
fail_under = 70

[tool.bandit]
targets = ["fireai", "tests"]
exclude_dirs = [".git", "__pycache__", "venv", "env"]
skips = ["B101", "B102"]  # Skip "assert used" and "exec used" for testing purposes

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings  
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "SIM",   # flake8-simplify
    "PGH",   # pygrep-hooks
    "PL",    # pylint
    "PT",    # flake8-pytest-style
    "RUF",   # Ruff-specific rules
    "ANN",   # typing: Any, NoReturn, etc.
    "BLE",   # boolean expression length
    "RET",   # return statement practices
    "D",     # pydocstyle
]
ignore = [
    "PLR",   # Design related pylint codes
    "E501",  # Line too long (handled by formatter)
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D102",  # Missing docstring in public method
    "D103",  # Missing docstring in public function
    "D107",  # Missing docstring in __init__
]

[tool.ruff.lint.isort]
known-first-party = ["backend", "core", "parsers", "fireai", "skills", "qomn_conduit", "db", "tests", "facp"]
known-third-party = ["fastapi", "uvicorn", "pydantic", "sqlalchemy", "alembic", "requests", "pyjwt", "passlib", "cryptography", "websockets", "asyncpg", "redis", "celery", "python_dateutil", "pytz", "pywin32", "pythonnet", "tenacity", "hypothesis", "pytest", "black", "flake8", "mypy", "ruff", "pre_commit", "bandit", "safety", "types_requests", "types_python_dateutil", "mkdocs", "mkdocs_material", "mkdocstrings", "numpy", "scipy", "shapely"]